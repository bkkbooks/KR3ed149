body:
  text: 䱐溪單方選外治方選合印敘古今單方外治方何啻數萬僕數十年來上自千金聖惠下及後醫著録與夫耳得諸友朋者隨時選擇去其不甚效驗者去其藥物冷僻不易覓者去其藥物貴重一時難至者去其藥品峻厲雖效而有後患者去其藥性太偏不知醫人誤用有害者分類編輯大而調理求嗣補養延年小而蟲螫火燙物刺食哽急而暴中短見遇祟中毒緩而久痢陰瘧虛勞痼症亦幾無病不備有藥皆靈矣同人見之以為窮鄉僻壤旅行客居得此一編勝於誤延庸醫慫恿付梓惟需款不資獨力難支爰商諸莊君心如劉君建堂發售預約券集資付諸石印僉得同意書成敘其緣起如此歲次戊午季春吳郡晉笙陸錦燧序
