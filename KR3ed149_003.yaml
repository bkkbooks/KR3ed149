body:
  text: 卷下飲食門食傷生冷及難化之物生薑或紫蘇煎湯揉擦心胃肚腹氣通食即化傷寒結胸停食陳香糟六兩生薑四兩水菖根四兩鹽二兩炒熱為餅敷臍胸前以火尉之內向即去大便利下惡物愈食物入鼻介介作痛不出牛脂一棗大納鼻中吸入脂消則物隨出四肢難動只進得食好大言説吃物是矢説物望病如説食雞時便云請你遂置雞於病人前卻不與食自睡中饞涎出而愈解酒毒大醉不醒生熟湯浸其身則湯化為酒而人醒矣解燒酒毒大醉不醒急以熱豆腐遍體貼之冷即易以醒為度又方用井水浸其發並用故帛浸濕貼於胸膈飲酒齒痛井水頻含嗽飲酒成癖無便叫呼全不進食日就羸弱將其人縛住置好酒一罈在前令聞酒氣而不與飲自有物出口中棄之江湖小兒乳停不化膈下硬如有物白芥子研末水調攤膏貼初生小兒口撮不飲乳載口門斷乳山梔一個辰砂麝香雄黃雌黃各二分輕粉一分研末擇伏斷日待兒睡熟麻油調搽二眉毛上即不思乳中蠱門畜刺蝟則蠱毒不入中毒門燒酒醉死井底泥罨心胸煤炭毒房中置清水一盆則免輕粉結毒膿水淋漓臭爛不可近楓子肉四兩輕粉一錢萆麻仁二兩爐甘石二錢杭粉二兩花椒五錢為細末搗加麻油捶成膏油紙攤貼瘡上先用花椒甘草煎湯洗淨三日一換服霜粉牙爛出血不止貫衆黃連各五錢為末水一鍾煎四五沸入冰片少許攪勻漱口每日二次忌豬腥油膩一月砒霜沾身痛潰以濕泥頻塗設毒氣入內而作吐瀉飲冷米醋或生緑豆研末麻油調服巴豆貼肉潰爛生黃連末水調敷仙鶴頂毒黏在草樹間人或不知以手摸腳踏登時赤腫疼痛異常青松毛和糯米飯搗敷中惡門中惡昏憒丹雄雞一隻安放病者心間以雞頭向病人面雞伏而不動待其飛下病者亦蘇中惡卒死蔥心黃刺入鼻中男左女右入七八寸血出即愈並刺入耳中五寸又方韭汁注鼻中又方使人尿其面上客忤中惡鐵器燒紅更迭投醋中就病人之鼻熏之鬼擊病吹酢少許入鼻中二便門大小便閉白礬末填滿臍中以新汲水滴之覺冷透腹內自通臍平者以紙圍之又方皂角末蔥白連須加麝香二分蜜少許杵貼臍下至毛際再以韭地蚯蚓泥搗和水澄清飲之尤妙又方甘遂末麵糊調敷臍中及丹田內服甘草湯小兒初生二便不通皂角燒研細末煉蜜為丸納穀道中二便關格皂莢燒煙於桶內坐上熏之關格脹滿大小便不通獨頭蔥燒熟去皮綿裹納下部氣即通前陰門陰腫痛癢荷葉浮萍蛇床煎湯日洗陰腫如斗生諸葛菜根洗春爛封之枯者水浸搗塗亦可陰腫大如升核痛久藥無效馬鞭草搗塗陰腫脹痛蛇床子末雞子黃調敷陰下濕汗滑石一兩石膏半兩白礬少許研摻陰濕諸瘡蛇床子二兩朴硝一兩煎水洗下部濕瘡熱癢而痛寒熱大小便澀食減身面微腫因多食魚蝦發風熱物得之用馬齒莧四兩研爛入青黛一兩再研勻塗上效陰冷椒炒熱布裹包囊下熱氣大通日夜易之以消為度又方乾薑牡蠣各一兩為末火酒調稠塗兩手上揉外腎陰冷痛悶冷氣入腹腫脹殺人酢和熱灰頻尉又酢和麵尉陰部生瘡鯽魚膽搽陰部惡瘡蜜煎甘草末塗陰瘡爛痛杏仁炒黑研膏敷妒精陰瘡鉛粉二錢銀杏仁七個銅銚內炒至杏黃去杏取粉出火毒研搽效又田螺二枚連殼燒灰稍入輕粉同研敷效陰瘡因不忌月事行房陰物潰爛用室女血衲瓦上燒研末麻油調敷陰瘡有二種一者陰蝕作白膿出一者生熱瘡熱瘡用黃柏黃芩等分煎湯洗仍另以二味研末敷小兒陰瘡人屎灰敷莖腫羊屎黃柏煎汁洗又方兒茶冰片研末各三分甘草湯洗過搽玉莖挺長痿腫絲瓜汁調五倍子敷山亭裸體臥莖被飛絲纏繞腫痛莖頭欲斷威靈仙搗浸水洗玉莖濕癢肥皂搗爛敷效又燒灰香油調搽陰蝕瘡烏鰂魚骨末敷陰蝕欲盡瘡痛甚者蝦蟆一枚燒灰兔糞一兩同研細每用少許敷瘡上日三四次陰頭疳蝕雞內金不落水拭淨焙脆研細先以米泔洗淨搽之陰頭生瘡諸藥不愈鱉甲煅研雞子清調敷玉莖下疳雞蛋殼炒研油調敷並分載各方於楊梅瘡門陰頭生下疳瘡蜜煎甘草塗又方橄欖燒研麻油調敷下疳瘡及陰莖上瘡黃柏蛤粉等分為末摻下部疳瘡生白果杵塗之又梔子去穰入明礬末麵糊封燒末乾摻效瀉濁疳半邊爛又名蠟燭疳從內爛出將人腳根上老皮瓦上焙脆為末黃柏末豬膽汁拌曬乾研摻患處烏金紙包頭妒精下疳米泔水洗再以訶子燒灰入麝香少許搽雖莖爛一二寸亦效下疳濕瘡蠶繭盛頭垢再以一繭合定煅紅出火毒研搽下疳瘡腫痛鳳凰衣煅黃連各等分輕粉片腦各少許為末濕用乾摻乾用鴨子清調搽囊腫蔥白汁調飛面塗又方水調牡蠣粉塗腎子腫如水晶陰汗潮濕灶心土三升研碎炒極熱加川椒小茴香將陰囊放在土面冷即再炒腎囊腫癢內有疥蟲好花椒烘脆研細末真柏油調塗外以舊帛包之陰囊腫痛硼砂一分水研塗又方煨蔥入鹽杵爛塗又方棉子仁煎湯洗小兒受蚯蚓囊腫如起水泡雞血塗小兒陰囊腫痛地龍糞甘草汁調敷或薄荷汁亦好小兒外腎腫大用牡蠣不拘多少為末雞蛋調塗即消陰囊濕腫紫蘇紫背浮萍各一兩水煎熏洗陰囊汗癢龍骨牡蠣粉撲陰囊濕癢松毛煎湯頻洗又烏鰂骨蒲黃末撲囊濕癢先以蔥椒煎湯洗再以五倍子臘茶研末少加鉛粉搽腎囊癢蔥三十根胡椒花椒各一兩蛇床子末一兩均作三服煎湯洗又方川椒杏仁研膏塗腎子爛老杉木燒灰蘇葉為末等分敷仍以蘇葉包之陰囊潰爛睪丸脫露名為脫囊真紫蘇莖葉為細末干敷如未破香油調塗青包葉包上腎漏陰囊先腫後穿破出黃口瘡如魚口能致命五倍子同石灰炒黃色去灰攤地出火毒砂盆內研細末不犯銅鐵乾摻瘡上腎囊皮爛龜板炙存性研入冰片少許麻油調塗即愈囊瘡作爛六一散四錢赤石脂二錢紫蘇一錢半兒茶一錢共為末摻之腎囊上一孔流血炒甲片細粉罨之以帕扎住外腎生瘡緑豆粉蚯蚓糞等分研塗囊生瘡川椒七粒蔥頭七個煎湯洗又方胡麻嚼爛敷良又方甘草湯洗後臘茶為末糝或油和塗小兒陰囊及岐股間生瘡汁出先癢後痛自瘥或復發將瘡搔去痂帛拭乾蜜敷更用面作燒餅乘熱以湯塗餅上尉寒症囊縮吳茱萸同硫黃大蒜調塗臍下蛇床子炒布包尉之熱症肝陰涸亦囊縮忌用此法傷寒陰症陰縮載傷寒門陰毛生蝨檳榔煎湯頻洗又方燒酒浸百部擦又方桃仁杵爛搽男子陰痿囊濕蛇床子煎湯洗陰囊或玉莖腫痛蔥白乳香搗塗即時愈腎囊風腎子腫大一名繡球瘋雞蛋煮熟去白留黃炒出油老杉木燒灰調油搽之又方胡椒煎湯洗又方皂礬煎湯頻洗新生小兒卵大日後長成恐變木疝滿月外俟端午日午時以腳盆盛熱水安於中堂抱小兒將卵放水內一浸再將小兒於中門檻上中間一擱其卵上之水印痕於檻將艾在檻上濕印處灸三壯效小兒臍突囊腫載臍門小便門小便不通豬膽連汁籠住陰頭一二時汁入自通又方蔥白連葉搗爛入蜜合外腎上又方蚯蚓糞朴硝各等分水和敷臍下又方皂角半夏麝香末填臍內再用田螺蔥白搗餅蓋之又方生白礬末五釐入臍以水滴之婦女小便不通皂角煎湯洗陰戶小兒不小便鹽安臍中尉小兒初生小便不通蔥白搗爛麝香三釐摻上敷蠐小便不通轉脬危急者蔥管吹鹽入玉莖中小便轉胞不出納衣魚一枚於莖中小便不通諸藥不效者麝香少許和頂心頭垢作條入莖中紙封馬口使氣透進莖內須臾即通又方蔥白細切炒熱包尉小腹冷即易仍以手擦掌心足心小便不通腹脹如鼓大田螺鹽半匙生搗敷臍下一寸三分女子轉胞小便不通腹脹如鼓數日垂危死豬脬吹脹以鵝毛管安上插入陰孔捻脬氣吹入小便閉小腹痛田螺少加鹽生搗敷臍下一寸三分即通小便虛祕桃枝柳枝木通川椒各一兩枯白礬三錢蔥白七個燈心一握水三十碗煎至十五碗用磁鉢盛之乘熱熏外腎小腹以被圍之不令風入若冷即易之再燒再熏良久便通如赤小豆汁下效水腫溺閉大蒜田螺車前子等分杵攤臍中寒症小便癃閉腫脹蔥一把麝香三釐搗餅貼臍小兒溺床龜溺滴臍中淋門急淋陰腫泥蔥半斤煨熟杵爛貼臍上遺精門遺精文蛤研細末以女兒津調貼臍內立止精滑善遺牽轉白牛法最妙其法不拘布帛做一小兜將外腎兜起拴在腰後褲帶之上此病自免夢遺臨睡以朴硝少許放手心用唾和將龜頭一擦效疝門諸疝初起發寒熱疼痛欲成囊癰新鮮地骨皮生薑各四兩搗如泥絹包囊上其癢異常忍之陰疝腫墜木鱉子仁醋磨調芙蓉葉末敷之熱疝痛處如火溲赤便艱口乾畏熱芙蓉葉黃柏各三錢為末以木鱉子仁一個磨醋調塗囊上濕疝陰丸作痛蘄艾紫蘇葉烘川椒炒熟各三兩拌勻乘熱絹袋盛夾囊下勿泄氣寒疝引急痛連小腹及睪丸偏縮者以胡椒十餘粒研細糝膏藥上烘熱貼陰囊上痛即已偏縮者貼小半邊蓋縮即寒也寒疝吳茱萸炒布包尉小腹又方桂末摻貼臍內睪丸腫痛名木腎用荊芥穗一兩朴硝蘿蔔各三兩蔥七莖煎湯淋洗偏墜作痛芙蓉葉黃柏各三錢為末木鱉子仁一個磨醋調塗陰囊自止偏墜患久者牡蠣灰良薑末等分唾津調塗患處疝氣入腹茴香炒作兩包更換尉後陰門腸胃流熱下注糞門暴腫帶殼蜒蚰數個搗研塗肛門腫痛木鱉子肉四五枚研細泡湯洗另用少許塗作癢者杏仁杵爛敷又方生苧根搗爛坐穀道赤痛熬杏仁杵作膏敷肛𧈟癢痛杏仁杵膏頻敷便燥努掙肛痛異常者以冰片硼砂研末雄豬膽汁調圊後搽肛門生瘡肛門主肺肺熱即肛塞腫縮生瘡白蜜一升豬膽汁一枚相和微火煎令可丸二三寸長作挺塗油納下部穀道生瘡久不愈雞䏶胵燒研末干貼之效臀癰芙蓉葉曬研胡椒焙研各二錢野苧根一兩蔥頭七個酒糟兩許共杵爛加米醋和敷即消又方蔥白杵爛蜜和敷又方芙蓉葉入鹽冰片各少許杵爛圍小兒月內糞門上忽有瘡孔名稱勾瘡急間白竭燒灰糝脫肛萬年青連根煎湯洗川五倍子末敷之又方先以麻油潤之再用風菱殼煎湯洗之又方枳殼防風各一兩枯礬二錢煎水乘熱熏洗又方鱉頭煅存性研加冰片摻之立收又方五倍子煎湯洗隨以赤石脂末摻上托入又方五倍子三錢白礬少許為末水一碗煎湯洗又方爬牆草煎湯溫洗浸肛隨浸隨縮上此草沿牆而上大似絲瓜葉者不可用須用小如茶匙樣光亮者又方蟬蛻研末菜油調敷又方貫衆朴硝橘皮等分為末每五錢煎湯淋洗後以木賊草燒研糝又方東壁土湯泡先熏後洗又方大田螺井水養三四月去泥以雞爪黃連研細末入殼內待化成水以茶洗淨將雞翎蘸掃之以軟帛托上大腸脫肛木賊草燒灰摻之按入或加龍骨又蜣螂燒研末入冰片摻托脫肛不收蒲黃和豬脂敷日三五度虛冷脫肛石灰炒熱故帛裹坐冷即易痔痢脫肛冷水調黃連末塗瀉痢脫肛石榴皮陳壁土少加明礬煎洗再用五倍子炒研末敷托而上久痢脫肛用訶子赤石脂龍骨各二錢研細末以茶少許和藥摻肛上絹帛揉入又方苧麻根煎湯外以木賊研末敷産後脫肛五倍子末摻小兒脫肛荊芥皂角等分煎湯洗又方螺螄三升鋪桶內坐其上少頃愈坐板瘡生臀上俗名臀支瘡八九月間西瓜皮刮薄存一粒米厚者日中曬脆研細瘡有膿則乾摻無膿將自巳津涎調末敷少頃瘡中流水即愈又方松香五錢雄黃一錢半研細和勻以綿紙包裹捻成條臘月豬脂浸透點火燒著取滴下油搽之立效又方蘆薈一兩炙草五錢研細末先以豆腐泔水洗淨抹乾將藥敷之又方滑石生大黃人中白密陀僧共研摻又方生芝麻細嚼敷又方藤黃搗碎摻在雄豬網油之上以青布一長條卷緊線扎浸菜油內一夜取出火燃取滴下油以杯承之埋土中一宿去火氣塗上即愈又方甘蔗皮燒存性研麻油調搽又方絲瓜皮焙乾為末燒酒調搽坐板瘡癢先以砂仁殼煎湯洗淨再用茅廁坑沿上之扼刮下曬燥研細麻油調搽三次小兒初生穀道無竅以金刀或銀刀割開外膜即愈大便門大便不通蔥一莖去根將蔥頭蘸草烏細末納肛門內又方巴豆仁乾薑韭子良薑硫磺甘遂檳榔等分研末飯丸雞子大早最先以椒湯洗手麻油塗手掌男左女右握藥一丸移時便通欲止則開握去藥以冷水洗手又方生薑削長二寸塗鹽納下部大便不通氣奔欲死烏梅十顆浸去核丸如棗大納一部實熱症便祕枳實麥皮鹽炒尉大便實結不下烈火煮竹葉一鍋乘熱傾桶內撒緑礬一把坐熏之或用蘿蔔葉亦可大腸虛祕連須蔥一根薑一塊鹽一捻淡豉三七粒搗作餅烘掩臍中扎定冷再易小兒大便不通以溫水漱口吸咂小兒前後心並手足心得紅赤色即通泄瀉門泄瀉不止諸藥罔效梧桐葉煎湯沐足泄瀉日夜無度針砂地龍豬苓共研末生蔥汁調貼臍上小便長而瀉止泄瀉暴利大蒜搗貼兩足心並貼臍中滯下門痢疾肛門腫脹如痔冰片研末乳調搽又方木鱉子五倍子共研調乳敷下痢肛痛不可忍熬鹽包坐尉之寒痢桂末填臍又方吳茱萸末敷臍噤口痢蒼朮甘草陳皮厚朴等分為粗末布包在肚上尉之逼藥氣入腹又方大田螺二枚搗爛入麝香三分作餅烘熱貼臍間半日熱氣下行效又方燒餅一個切作兩片挖空納木鱉子淨仁研泥六個烘熱覆臍互換毒痢噤口水蛙一個並腸肚搗碎瓦烘熱入麝香五分作餅貼臍上小兒噤口痢大蒜搗貼兩足心或臍中久痢脫肛白龍骨粉撲痢頻脫肛黑色堅硬巴豆殼燒灰芭蕉自然汁煮入朴硝少許洗軟用真麻油點火滴於上以枯礬龍骨末摻肛頭上芭蕉葉托入痔門凡痔雞鴨鵝牛膽不拘何種頻搽有效又方五倍子三四個皮硝一撮水二碗煎濃奈先熏後洗又方蜒蚰一條冰片五釐膽礬二釐和化蜒蚰水點之即縮上痔瘡槐根或桃根或蘿蔔或冬瓜皆可煎湯頻洗又方每登圊後取冷水沃頻沃愈又方蜒蚰杵爛搽又方田螺入冰片化水點之又方皂礬礬紅等分為末對肛門瘡口將藥貼著坐片刻如痛即去痛止再坐數次痔瘡有蟲蜣螂生搗為丸塞肛門中引蟲出痔瘡有蟲作癢或如膿血多槐白皮濃煮汁先熏後洗欲大便當有蟲出仍以皮為末綿裹納下部痔漏鯽魚一條去腸入白礬令滿瓦上燒末以雞羽掃藥敷效又方啄木鳥燒末納孔中不過兩三度瘥下部漏瘡苦參煎湯日日洗痔漏瘡痛活鯉魚鱗三五斤綿裹如棗形納入肛門坐片時痛止痔漏退管白鴿糞一升放罐內以滾水衝入罐中乘熱病人坐罐口熏之要坐久忍痛治瘻冬瓜藤濃煎湯熏洗愈內痔落下大團魚頭一個火煅為末搽痔上即刻收外痔疼痛坐臥不得大田螺八九個將針挑開靨蓋入冰片白礬末少許在內以田螺尖埋土中令其蓋仰上經一宿螺水以雞毛搭痔上外痔長寸槐花煎湯頻洗並服之翻花痔瘡木瓜為末以蟬魚身上涎調貼以紙護住雞冠痔黃連末敷加赤小豆末尤良女陰門陰寬肥皂子浸去黑皮用其白肉加白及五倍子蛇床子石榴皮甘松山奈龍骨煎濃湯日日熏洗寬而冷者加石硫黃煎陰冷乾薑牡蠣各一兩為末火酒調稠搽兩手上揉兩乳又方母丁香末紗囊盛如指大納陰中又方川椒吳萸為末煉蜜丸彈子大綿裹納陰中陰癢雞肝或豬肝炙熟切一長條插入陰戶內過一夜次早取出數次愈又方桃仁杵爛綿裹塞又方小薊煮湯日洗三次又方蛇床子一兩白礬二錢煎湯頻洗陰癢不可忍杏仁燒灰乘熱綿裹納陰中日再易陰戶內生瘡作癢活蚌一個剖開將有肉半個手拿對陰戶一夜次日又用一個陰腫羌活防風煎湯熏洗又方蔥白研膏入乳香末拌勻敷患處又方甘菊苗搗爛煎湯先熏後洗陰腫痛生地當歸川芎白芍乳香等分搗成餅納陰中陰腫或生瘡枸杞根煎湯頻洗女腫不下小戶嫁痛冬青葉小麥甘草等分水煎洗産後陰腫蘿蔔煎湯洗效又方蓮蓬殼煎洗凡産後女陰病並載産後門陰痛枯礬甘草等分為末棉裹納陰中又方青布裹炒青鹽尉陰挺用飛礬六兩桃仁一兩五味子雄黃各五錢銅緑四錢共研細末煉蜜為丸每重四錢即以方內雄黃為衣坐入玉門內即愈甚者不過二次又方藜蘆為末豬油調塗日易又方茄根燒末油調紙上捲筒納入一日一易又方冰片五錢鐵粉一錢水調塗婦人陰挺出下脫桂心吳茱萸各一兩戎鹽二兩並熬令色變研末綿裹如指大納陰中日再易茄子疾生枳殼為散煎湯熏洗仍用綿包枳殼渣納陰中陰脫蛇床子五兩烏梅十四枚煎湯日洗五六次婦人陰下脫若肚先以淡竹根煎湯洗再用五倍子白礬末摻效陰爛煅牡蠣飛滑石各三錢陳蚌殼煅二錢人中白煅一錢龍骨煅錢半冰片二分共研末摻之陰戶臭爛熟乳香冰片珍珠末象牙末兒茶各三分搽麵粉一兩煅鵝黃色牆上白螺螄殼煅淨末一兩共研細末先用米泔水煎入雄黃三錢淋洗患處然後上藥效陰戶蟲癢杏仁燒存性研爛綿裹納入陰中有蟲癢且痛目腫身黃欲得男子漏血下白少氣思美食一尺長鯉魚去頭肉取骨搗末熬黃黑以豬脂和絹袋盛納陰中抵痛處陰蝕豬肝煮熟削如梃鑽孔數十納陰中良久取出內有蟲另易一挺蟲出盡愈又方肥豬肉煮汁頻洗陰𧈟甘草乾漆各三錢黃芩川芎當歸生地各二錢炙鱉甲五錢煎湯頻洗又方桃仁一錢雄黃苦參青葙子黃連各二錢半研末生艾汁丸小指大納陰中陰傷出血五倍子研末摻之或加血餘黃連白礬灰亦妙或以青布燒灰血餘等分研敷之又方蛇床子研未綿裹納陰中立效女童交接陽道違理血出不止燒發並青布末為粉塗又方赤石脂末摻女人交接陽物違理及他物所傷致血流漓釜底墨斷壺盧塗藥納之陰瘡陳蚌殼煅兒茶輕粉飛滑石人中白煅三錢枯礬龍骨煅各一錢冰片三分共研麻油調搽又方桃葉杵爛棉裹納陰中陰瘡爛痛杏仁燒黑研膏敷婦人陰戶內生瘡癢痛難堪鮮豬肝切成條於香油中微燙過抹樟腦川椒末插入引蛆蟲候一時辰取出再換女子初生無前陰者以金刀或銀刀割開外膜即愈女子初生前陰膜鞔如鼓雖有小孔通溺礙於人道名曰鼓女又名實女幼時用鉛作鋌日紝之久久自開無異常人求嗣門無子者虎鼻懸門上一年取熬作屑與婦人飲便生貴子勿令婦知知則不驗又已有子懸於門上令生男始孕轉女為男雄黃一兩絳囊盛帶婦人左臂或繫腰下百日去之又方萱草即宜男草妊婦佩之又方雄雞長尾拔三莖置孕婦席下勿令知之胎孕門保胎法井底泥和入灶心土敷臍下或加青黛胎前病熱未放荷葉焙乾五錢蚌粉二錢半新汲水入蜜調塗腹上胎前病寒恐損胎伏龍肝研水調塗臍方寸干再上胎前患霍亂胎不安者井底泥敷心下及丹田妊娠轉胞尿閉脹急令産婆香油塗手自産門入托起其胞則尿出如注又方蔥白細切和鹽炒熱尉臍下立通母病欲下其胎生附子末醇酒和塗右足心胎下速去之又方獨根土牛膝塗麝香插入牝戶中臨産門將産前井華水服半升不作運橫生難産兩手各握滇南檳榔二枚惡水自下手足先出者以鹽半分多則恐上衝心塗兒手心或足心仍抹油輕輕送入推上扶正待兒身轉即順矣逆生兒腳先出取其父名書兒足下即順生盤腸生子腸先出産後不收者以半夏末頻搐鼻即上娩時腸出傷名盤腸生麻油潤大紙捻點火吹滅以煙燻鼻又方濃煎黃柏湯浸其腸胞衣不下蔥白煎濃湯熏洗下部又方草紙燒煙熏母鼻又方鮮荷葉濃煎洗下部又方伏龍肝末醋調納臍中子死腹中及胎衣不下本婦鞋底炙熱尉腹上下二七次生胎欲去牛膝一握搗以無灰酒一盞煎七分空心服仍以獨根土牛膝塗麝香插入牝戶中下胎生附子為末醇酒和塗右足心胎下去之死胎不下萆麻仁三粒巴豆仁四粒麝香二分同研成餅貼産門上交骨其胎立下即安胎至足月臨盆久而不下之難産亦可貼而即産但勿用之稍早恐有揠苗之害也又方牛屎熱塗産母腹上臍下産後門兒出即暈迷不語急用銀針刺眉心得血即生再為服藥産後血運不省人事極危殆者韭菜入有嘴磁瓶內煎熱酢沃之便密扎瓶口以瓶嘴向産婦鼻孔令酢氣透入産後暈絶生半夏末冷水和丸如豆大納鼻中灌以熱童溺熏以醋炭效産後血運鐵器燒紅更迭淬醋中就病人之鼻熏之産後腸出不收枳殼煎湯浸之又方大紙捻蘸香油點燈吹滅以煙燻鼻中又方半夏末搐鼻中取嚏産後陰脫以溫水洗軟用雄鼠糞燒煙熏之又方硫黃海螵蛸各五錢五倍子二錢半研敷産後脬墜黃連狗脊五倍子澤蘭枯礬各一兩為末煎湯洗乘熱輕托入産後子宮墜先用淡竹根煎湯洗淨次用五倍子青礬為末糝産後舌出不收丹砂敷之暗擲盆碎墮地作聲驚之自收産門不閉石灰炒熱淬湯熏産後陰腫痛桃仁細研塗又産後陰腫載女陰門産門受風紅腫作痛蔥白杵爛入乳香末烘熱貼勿洗去産門受傷由兒大或收生不妥或天時暑熱以致産下即腫而疼蚌肉濕草紙包煅研末糝産後腹中癢箭竿及鏃安所臥床席下勿令人知産後腸中癢不可忍以針線袋安所臥褥下勿令人知産後燥熱陰翻遂成翻花澤蘭四兩煎湯熏洗二三次再入枯礬煎洗産後溺閉不通橘紅二錢為末空心溫酒下産後衄血血崩急取緋線一條併産母頂心發兩條緊繫産母手中指節小兒初生門小兒初生斷臍帶以艾絨為燃麻油浸濕熏洗臍帶至焦方斷束臍用厚綿軟帛束緊勿令沾濕浴不宜早浴湯中用豬膽汁一枚可免衆瘡小兒斷臍用清香油調發灰敷濕者乾摻可免驚風等症勿誤用燈中油小兒生下益母草煎湯洗一世少瘡疥小兒初生不能發聲不可斷臍將胞衣火炙令暖送氣入兒腹另取貓青布包裹拿住在兒耳邊以齒隔布咬貓耳貓大叫兒即開口又方以蔥白莖鞭之小兒初生白膜裹舌或遍舌根可由指甲刮破令血出以燒礬末半緑豆許敷之若不刮破其兒必啞小兒初生無皮泥地上臥一宿即生冬月以白米粉燥撲之候皮生乃止小兒胎毒草房上青苔焙乾研末麻油調敷胎毒胎瘡胭脂膽礬黃柏東丹等分研末菜油調搽又方水邊桕樹根白皮曬研入雄黃末少許生油調搽小兒初生兩目紅腫赤爛不開以蚯蚓泥杵塗囟門干則易之三次必愈又方生南星生大黃等分為末醋調塗兒兩足心雖月外亦可用小兒初生驚風欲死硃砂磨新汲水塗手足心母有娠乳兒有病如瘧痢他日亦相繼腹大或發或瘥以紅紗袋盛夜明砂與兒佩四肢門手足心腫乃風也椒鹽末等分酢和敷良四肢冷曰厥逆有寒厥有熱厥寒症用硫黃白芥子末填臍熱毒攻手足赤腫焮熱疼痛欲脫煮馬屎與羊屎汁漬之日三度手足麻木不知痛癢霜後桑葉煎湯頻洗手足筋吊以及麻木以木瓜攜握踐踏口中亦念木瓜二字即愈手足皺裂生白果杵爛塗擦手足骨節脫出以韭菜一握燥炒半熟鹽少許搗極爛乘熱遏患處以布縛好一夜即愈手足凍瘡痛者橄欖核燒末用香油調塗又老絲瓜燒灰和臘豬脂塗病後遺毒四肢紅腫黃柏末蜜調塗又方田螺同鹽搗敷又方馬齒莧搗敷又方羊屎馬屎煮汁漬之遺毒四肢為熱流注醋濕紙貼再炒鹽青布包尉之遺毒四肢為冷流注腫而不赤寒濕未盡也紫荊皮獨活白芷末蔥調熱敷臂門臂膊脫生地黃搗爛攤紙上摻木香末一層再鋪地黃泥一層貼患處臂竅如針孔驟濺出血晝夜常流面色潔白身倦無氣炒甲片研細罨之以帕扎住肩臂纍纍如赤豆者為瘭疽剝去瘡痂熱酒和麵敷男婦大小腋肋臂腿腰等處忽如火熱腫硬如石痛不可忍傴僂局蹐急用糯米炊飯少加食鹽蔥管共搗罨一二次過宿即松其渣務傾河內手門掌痛椒鹽末等分醋和塗手背皸裂生白果嚼爛塗又方蘿蔔煮熟敷鵝掌風艾湯熱洗又方豆腐泔水洗又方鴿屎白雄雞屎炒研煎水日洗鵝掌風癬雄黃穿山甲片火燒熏數次手掌心生毒名拓盤又名擎疽爛溏雞屎塗效指爪門指麻不知痛癢者霜桑葉煎濃湯頻洗受水濕之氣毒聚不散指痛木癢蜒蚰和銀硃搗擦效手丫指痛苦無奈通草屑為末雞蛋清調塗指腫痛防患毒漿水入鹽熱漬之冷即易手指掣痛醬清和蜜溫熱浸之愈乃止指縫搔癢成瘡血出不止多年糞桶箍篾燒灰敷人指咬爛久欲脫者鱉甲燒灰敷刀剁手指用真降香六分荔枝核四分燒灰存性拌勻將剁下指頭用口含之以唾津潤之將藥敷上用筆管或竹管兩半個合捆直外用布縛之勿令搖動七日可以全愈如剁下三四日者照此治之亦妙指上疔瘡雄黃細末和蜒蚰搗爛敷拍蟹毒即手大指食指間所生俗名丫指活蟹打爛塗蛇眼芙蓉花或葉取鹽滷浸爛塗蛇頭瘡雄黃蜈蚣全蠍各一錢共研瘡口開入藥在內以小帛抹油拴住干則頻以油潤天蛇頭用蘿蔔一段挖空入雄黃末三分蒸半熟套指上又方蒲公英搗盦患處效天蛇頭指痛臭甚者黑豆生研末入蠶繭內以指籠之指甲軟薄者白殭蠶燒煙熏之則厚婦人指甲內生瘡惡肉突出日久不愈名臭田螺皂礬日曬夜露每以一兩煎湯浸洗仍以皂礬末一兩雄黃二錢硫黃乳香沒藥各一錢研勻搽代指疼痛蚯蚓杵敷之代指俗名疒貢爪烏梅入醋研浸患處又方生雞子開一孔將指浸之浸三個愈又方忍冬藤蒲公英煎濃汁浸腿膝門男婦大小腋肋臂腿腰間等處忽如火熱腫硬如石痛不可忍傴僂局蹐急用糯米炊飯少加食鹽蔥管共搗罨一二次過宿即松其渣務傾魚池或河內腳腿紅腫熱如火炙鐵鏽水塗環跳穴及兩膝附骨等處感受風寒濕氣皮上不熱色不變漫腫無頭微覺痛攣拘不即治變生貼骨等癰難以收功紫荊皮五兩炒赤芍二兩炒香白芷一兩曬燥勿經火石菖蒲一兩五錢曬燥勿經火獨活一兩五錢炒磨末好酒和蔥五莖煎滾調搽不必留頂一日一換腫消不痛為度流火以大張海蜇皮包之干則易又方生煤炭研極細末醋調塗之又方朴硝大黃寒水石牙皂為末雞子清調敷又方人中黃研細芭蕉根汁調塗又方蘿蔔煎湯洗之仍以蘿蔔曬乾為末鋪襪內又方馬前子一個以粗碗底磨水用雞毛掃遍日掃五七次立效又方鮮紫蘇鮮鳳仙花洗淨連根葉搗爛放木盆內滾水衝入將腳架盆上熏至可洗以軟帛洗之立愈雖數十年者不過三四次亦不發矣濕氣爛腿松香入水慢火煮一炷香入冷水候凝換水再煮如此八次其毒已盡研細末豬脂搗爛調勻隔紙膏攤之以有孔一面紙向患處貼有脂流出足臁爛瘡韭地蚯蚓泥乾研入輕粉清油調敷腳脛爛瘡臭穢不可近蜒蚰十條瓦焙研末油調敷效濕毒臁瘡爐甘石童便制八九次豬油調搽效臁瘡馬齒莧煎人黃蠟熬膏塗又方豆腐泔水熬成膏塗又方棉子炒脆取末填滿瘡內扎好不可開看自然痂愈又方柿葉燒灰川椒研末搽之又方先以鹽湯淋洗用帛拭乾後以白糖霜津唾塗敷又方生豆腐渣捏成餅如瘡之大小先用清茶洗淨絹帛拭乾然後貼上以帛束之一日一換瘡漸小肉漸平而愈但勿落水又方龜板炙爐甘石煅各三錢輕粉二錢冰片一二分共研細末麻油半杯銅銚內熬滾入白蠟黃蠟各二錢溶化離火將凝入前藥末攪勻攤油紙貼患處以蔥椒甘草湯洗一日一換又方黃牛矢曬燥煅黑四兩煙膠末一兩共研細末少加冰片香油調搽又方香油一兩鐵杓煎入黃蠟五錢化開用銅緑三錢研細末徐徐入杓內作五十餘次人將銅錢銼末另放碗內將藥傾入冷定將瘡洗淨用氈一塊如瘡大攤藥於上扎患處一日一換換時須洗淨臁瘡用清涼藥不效者改用鹿角灰乳香末研勻清油調敷臁瘡不斂蔥鹽湯洗淨拭乾馬屁勃末敷愈臁瘡生蟲小蝦三十隻去頭足殼同糯米飯研爛隔紗貼瘡上別以紗罩之一夜解下挂看有小赤蟲以蔥椒湯洗淨再用舊茶籠內白竹葉隨大小剪貼一日兩換待汁出盡逐日煎苦楝根湯洗之臁瘡潰爛以鹽湯洗淨用左草鞋洗淨燒為末加輕粉五分敷腿腳爛鴨掌燒麻油調抹臁瘡久不收口鮮桑根皮一斤生豬板油四兩搗作餅將一餅貼之每日一換五六日後換生肌藥用赤石脂乳香沒藥冰片炒黃輕粉煅過狗脛骨麻油調塗多年臁瘡驢蹄剔下足皮或舊爛鞋底牛皮末麻油調搽濕處燥摻驗或人腳下剔落皮更妙腿肚瘡人乳桐油等分和掃又方貫衆煎洗再用百藥煎研末唾和圍之腿肚生瘡初起如粟搔之漸開黃水浸淫癢痛潰爛遂致繞脛酸榴皮煎濃汁冷定頻掃脛骨生碎孔髓流出載足門兩足心凸腫條足趾門腳暴軟赤蓼燒灰淋汁浸之再以桑葉蒸罯愈腳冷難行白酒或酒腳盛大口甏中灰火溫之漬腳至膝時加灰火勿令冷三日止麻腳寒痧兩人各持薑渣一團擦兩手足心兩臂腿彎前胸後背腳底木硬牛皮膠生薑汁化開調南星末塗烘物尉之兩足痛如刀割不紅腫者生薑蘸香油擦隨用生薑燒熱搗爛敷腳底疼痛用何首烏為末以醋調和敷在腳底以尉斗烙之兩足濕氣作痛用艾葉二兩蔥頭一握搗爛生薑一兩半用布共為一包蘸極熱燒酒擦患處以痛止為度腳跟腫痛不能著地黃牛糞入鹽烘熱罨之濕氣腳腫蔥湯日浸三五次毒熱足腫酒煮苦參湯漬痛即止腳腫痛樟腦二兩烏頭三兩為末醋糊丸彈子大每置一丸於足心下微火烘之衣被圍蓋出汗腳腫冷痛草烏頭三個去皮臍為末醋調貼水鄉農人多患腳氣一腫不消與尋常腳氣發過腫消者迥異杉木刨花煎濃湯人朴硝一兩頻洗又以藍布浸鹽滷束病後足腫狗脊草煎湯浸洗夏月趾腫不能行走九月收茄根懸簷下夏日煎湯洗腳心腫痛因久行久立所致者水和蚯蚓糞厚敷過夜愈腳氣不論男女濯足宜頻濯時水中宜加入鹽滷一盞終身用之可免一切足疾以滷能去一切風火濕熱垢濁而潤皮膚舒筋骨真妙法也腳氣甘遂末水調敷內服甘草湯常以杉木或蘿蔔煎湯洗可除根腳氣疼痛每夜鹽擦腿膝至足甲淹少時以熱湯泡洗驗腳氣腫痛黃豆茄樹根煎水洗腳氣上衝大田螺杵爛敷兩腿上腳氣衝心白檳榔十二個為末分二次熱童便下外用附子末鹽滷調塗湧泉穴又方白礬三兩水斗半煎沸浸洗或加杉木片二兩腳氣並寒濕用老杉木油節煮湯入水桶內先熏後洗即愈腳氣筋攣以木瓜切片囊盛日踐踏之足上轉筋故綿浸酢中甑蒸熱裹冷即易勿停腳氣腳汗用蘿蔔煎湯洗腳多濕汗楊花著鞋襪內尸腳坼裂雞屎煮湯漬半日瘥止冬夏皆須此法腳坼裂破凡冬月患此行步疼痛用湯洗淨拭乾將黃蠟一兩溶化入松香末三分用少許安刀上滴入坼中即愈足爛如蟻窩鵝掌皮煅末摻之腳跟孔深半寸許有水流出其痛異常人中白煅研摻之女人腳踝臁上受濕氣起白泡痛腐烏桕樹嫩葉水浸軟抹燥貼足跟瘡鹽漿水溫洗後以白朮研細糝腳面生瘡不收口松香枯礬杉木灰各一錢為末麻油調敷腳上臭瘡熟雞子黃一個黃蠟一錢煎油塗腳肚生瘡初起如粟搔之漸開黃水浸淫癢痛潰爛遂致繞脛而成痼疾酸榴皮煎湯冷定日日掃之愈乃止兩足心凸腫上生黑頭瘡硬如釘脛骨生碎孔髓流出身發寒顫惟思飲酒此是肝腎兩經冷熱相吞炮川烏頭末敷內服韭子湯腳背生蟲草紙燒煙久熏蟲自出腳蛀生豆腐渣捏成餅先用清茶洗然後貼上一日一換則愈瓷鋒嵌腳白果肉浸菜油中年久愈佳搗敷患處釘鞋打傷足跟載跌僕傷門腳繭切勿刀剃以荸薺去皮生擦繭處久之自愈遠行足研日草鞋浸溺桶內半日以新磚燒紅取草鞋放紅磚上以腳蹈之令以火逼溺氣入內即消又方水調半夏末塗過夜遠行足趼起疱者水調生面塗一夕行遠路足底起泡蘿蔔子炒研末和白礬末鋪鞋底行遠路永不作痛遠行人息足時宜浸足於溺桶中可免諸患腳發背初起甘草鹽滷煎湯洗即消農家糞澆地上烈日曬逼足行於此受熱氣之毒足趾腫痛似潰非潰俗謂惹肥又名烏茄疔鴨毛煎湯和皂礬洗穿窄履而生肉刺足指礙痛以大棗肉杵貼候爛剔之嵌甲胡桃肉皮燒灰貼其腫痛者知母燒末摻嵌甲痛不能行橘皮煎濃湯浸良久甲肉自離輕手剪去以虎骨末敷足指甲入肉作瘡不可履礬石燒灰敷蝕惡肉生好肉細割甲角效甲疽陳皮嚼爛貼干即易又方黃柏烏頭尖等分研洗淨敷貼雞眼肉刺滷湯浸濯刮去一層木耳浸軟貼消爛不疼雞眼荸薺半個貼患處過夜次晚再貼五六夜其患連根脫出又方蔥剖開將有汁沫一邊貼其上包好數次自消腳趾脫疽漸上至膝色黑內陷痛甚逐節脫落土蜂房煅研末醋調搽愈脫腳傷寒載傷寒門腳趾縫丫感受潮濕水氣紅赤腫癢搔之疼痛爛腐難行烏桕樹嫩葉水浸軟抹燥嵌貼腳丫內腳指縫癢爛用銅緑末敷又白爛者鵝掌黃皮燒研細末敷腳指濕爛蚌蛤粉干搽腳丫爛用荊芥葉搗爛敷又方以干茶葉嚼細敷松蘿更佳腳縫搔癢成瘡以多年尿桶燒灰敷趾潰芒硝煎湯洗淨以烏梅核中仁為末醋調塗又方豬脂調蚯蚓糞敷風門重傷風鵝不食草研吹鼻涕淚出即清爽風寒作痛橘葉老薑蔥頭不拘多少和酒炒熱布包頻尉患處風熱發熱前胡牛蒡桑葉等分煎熏之中風門中風牙噤白梅肉南星末擦暴中風卒倒痰涎壅盛牙關緊閉巴豆紙裹皂角末為捻熏鼻吐痰即醒中風昏厥皂莢末或半夏末或細辛末吹鼻又方生薑擦頭即醒凡中風昏迷口噤用皂莢末吹入鼻中中風口眼喎斜取大蟬魚以針刺頭上出血左斜塗右右斜塗左正即洗去又方皂莢去皮為末醋和右歪塗左左歪塗右又方南星末皂莢末加醋雞冠血調和貼半身不遂蠶砂二石蒸熟裝三袋以一袋炒熱著患處冷即輪流易之寒門感冒寒邪令兩人各持薑渣一團擦兩手足心兩臂彎前胸後背得汗解發散寒邪胡椒丁香各七粒碾碎以蔥白杵膏和塗兩手心合掌握定夾於大腿內側臥溫覆取汗寒濕氣白芥子研爛陳醋調攤雙皮紙上做夾紙膏以針刺密孔先將新棉花薄鋪一層放患處後將夾膏貼棉上片時即似火燃熱過揭去中寒腹痛吐利唇青面黑身背強四肢冷脈沉細咽喉不利食鹽一斤炒焦大熱布絹兩重作囊包盛尉陰臍聞冷即易傷寒門傷寒陽毒熱症癩團破腹覆胸傷寒陰毒寒症剖雞燒酒噴之以覆胸口傷寒不汗胡椒丁香蔥白搗塗兩手心夾兩腿內側臥勿動取汗傷寒直中三陰經初無頭疼發熱而面㿠白肢冷小腹絞痛者吳茱萸二兩五錢酒拌蒸絹包尉臍下足心夾色傷寒即陰症由房後感寒食冷而得肚痛面青者滾水沖鴿糞一升熏被蓋睡又方雄鼠屎兩頭尖者醋丸納臍中陰證傷寒腹痛厥逆芥菜子研末調貼臍上傷寒舌出巴豆霜少許紙捻卷納鼻中又方梅花片腦半分為末糝陰症陰縮露蜂房燒研末蔥丸包於陰口熱症肝熱亦能陰縮此方審用發狂炭火一盆將酢一碗沃火內使煙氣衝入病入鼻中又以涼水噀面脫腳傷寒溺捅砂樟木屑陳小粉醋調敷熱痛處效大病瘥後多虛汗龍骨牡蠣麻黃根等分為末粉身暑門熱行道路自覺頭目悶昏不能支持速伏道上口鼻向上效中熱暴昏大蒜搗爛調冷水以匙挑灌鼻中又中暍熱暍分載暴死門中暑挾虛昏絶沉香檀香燒熏令氣滿室達竅即醒濕門寒濕氣載寒門凡濕以尿赤口渴為濕熱尿清不渴身體冷痛為寒濕如濕熱凝結頭面滯重赤小豆搐鼻出水濕熱凝結肚腹腫脹赤小豆敷臍行水溫熱門熱病神昏鐵器燒紅更迭淬醋中就病人之鼻熏之瘟疫門闢疫邪用皂莢蒼朮焚煙天行瘟疫取初病人衣甑上蒸過則一家不染凡人欲近病者明雄黃或蒼朮口中細嚼塗擦鼻內常有藥氣自然不染鼠疫生核用病人床上臭蟲十餘枚加紫蘇砂糖同搗如膠以銀針在核上刮出紅色敷上即消他床上臭蟲亦可用鼠疫結核用山慈菰三錢青黛一錢生黃柏錢半浙貝錢半赤小豆二錢共研細末調麻油塗又方劈舊旱煙杆內煙油塗核又方蓮鬚蔥頭搗爛加雄黃冰片調塗虛勞門傳尸伏尸皆有蟲令病人仰手掌以帛覆其上燒乳香熏手背良久手背上出毛長寸許白而黃者可治紅者稍難青黑者即死諸疳門小兒疳瘡嚼芝麻敷又方鉛粉末豬油調搽又方生嚼栗子敷小兒諸疳遍身及面上生瘡爛成臼如大人楊梅瘡狀蒸糯米甑蓬四邊滴下氣水以盤承取掃瘡上效小兒口疳蔗皮燒研摻又方雞內金燒灰敷效牙疳銅緑杏仁滑石等分為末擦又方蘆薈青黛黃柏雄黃等分為末加麝香少許糝貼又方五倍子開一孔去穰以蘆薈末填滿更入生蟾酥少許厚紙面糊好煅放泥地去火氣以雄黃麝香各少許共研末每用少許糝咽津無妨牙疳以象牙屑廉珠各三分飛青黛六分梅花冰片三釐土牆上蟢子窠二一個西牛黃人手指甲各五釐共研細粉吹患處雖瀕死者可救走馬牙疳尿桶中白焙乾為末入冰片少許揩牙效又雞肫皮不落水者五枚枯礬五錢研搽愈邪祟門客忤以綿漬好酒中須臾置病入鼻間擠汁入鼻中小兒犯客忤發作有時以母月衣覆兒身上又方菖蒲汁納口中中惡蔥心黃刺鼻孔出血愈又使人尿其面上可愈鬼擊病吹酢少許入鼻中鬼靨不寤伏龍肝末吹鼻中女人與邪物交通獨言笑悲思恍惚雄黃松脂虎爪末火籠中熏令病人坐其上以被蒙蓋惟出頭目五絶門壓縊溺凍魘五絶兩人以竹管吹耳又方生半夏末吹鼻及耳自縊勿斷繩放下用皂角末細辛末吹鼻又方蔥心刺鼻出血男左女右凍死及落水凍死者但胸前有微熱即可救活急須脫去濕衣換好人貼身熱衣包之不可令其近火須用布袋盛炒熱爐灰放在心口如冷即換熱者待開眼以溫酒薑湯灌之如不醒以艾灸門牙縫聲喊即活若不先溫其心口急用火烘必死無救又方炒灶灰布包敷心上可以急救溺死灶中灰兩石余以埋入至足留頭水出七孔即活溺死一宿者尚可救搗皂莢帛裹納下部須臾出水即活卒墮顛壓倒打死心頭溫者可救將本人如僧打坐令一人將其頭髮控放低用半夏末吹入鼻內如活卻以生薑汁香油打勻灌之卒魘不醒韭汁灌鼻孔中劇者並灌兩耳又分載暴死門鬼魘不醒皂莢為末如大豆許吹鼻中得嚏氣通起死回生臥忽不寤勿以火照之殺人但痛齧大拇指際而唾其面則活再取韭汁吹鼻孔冬用韭根汁灌口中又雄黃搗細末吹入鼻中癰疽門癰瘍初起焮赤腫痛花粉赤豆等分醋詞圍之又方木芙蓉花葉根皆可用杵爛乾者研末蜜調圍之中間留頭干則頻易初起即消已成即膿聚而潰已潰者易斂生肌或加赤豆末同圍功更大癰疽發背初起未成者苧根熟搗敷日夜數易腫毒初起醋或豬膽汁磨墨厚塗又方灶心土搗蒜和敷又方搗大蒜加麻油厚敷干則易又方馬齒莧搗敷又方木芙蓉花或葉或皮搗敷初起敷腫拔毒金銀藤大者燒存性葉焙乾為末各三錢大黃焙為末四錢以水酒調搽四圍毒生要害以雄黃飛面蚯蚓屎共研細醋調塗漸漸逼近毒即移過要害處又方以藤黃銀硃等分醋和敷毒之半圈即移他處出毒癰腫豌豆研末塗又方未成膿者耳垢封之即散癰疽未腫米酢和蚌蛤灰塗干即易一切癰瘍麥粉陳久者炒焦醋熬成膏塗又方浸胖大黃豆研塗又方赤小豆生研入苧根杵勻雞子清調敷又方蓴菜搗敷未成即消已成即毒散又方赤小豆四十九粒為末和雞蛋白野苧根敷癰疽發背生地與歸各一兩麻油二兩煎至枯黑去滓白蠟溶化攪勻貼無名腫毒小粉銅鍋炒淡紅勿使焦黃隨攤地下去火毒收入瓶勿泄氣麻油調敷已破者乾摻又方鮮桑枝火熱向患處熏又方蔥白和生蜜搗爛塗此二物相反勿入口又方用生豆腐渣於砂鍋內焙熱看紅腫大小量作餅子貼之冷即易以愈為度又方煙管中油塗之立散又方野苧根搗汁醇酒和服渣敷患處露蓋被出汗即出膿水而愈雖發背對口亦可治又方大芋頭生杵爛敷之又方龍眼核為末水調塗之一切奇瘍惡毒生肥皂去子弦及筋搗爛入醋和敷無名惡瘡不識名者用死蜣螂杵汁塗多年惡瘡鉛粉硃砂等分為末蜜和塗又方諸藥不效馬齒莧搗爛敷瘡腫焮熱大痛以大黃末醋調敷之燥即易驗癰瘍不論已成未成牛皮膠水漬軟當頭開孔貼之未膿自消已膿潰出癰成不潰雀屎堅硬者酒調塗之即破疽毒深遠膿難直取或患人畏用刀針者膿熟時以驢蹄皮炒蕎麥麵各一兩草烏去皮四錢共研勻加食鹽五錢水調和成薄餅瓦上炙微黃再研細醋調攤紙上貼患處膿即從毛孔出或從塗藥旁另潰一孔而出瘡久不愈棗膏三升煎水頻洗積年惡瘡反花瘡漏瘡不瘥者牛蒡根搗和臘月豬脂日日封之又方多年石灰研末雞子清和成塊煅過再研薑汁調敷溫毒外腫水仙花根剝去老赤皮與根鬚入石臼搗如膏敷腫處留孔出氣干即易以肌膚上生黍米大小黃瘡為度過敷則痛甚而爛以大黃黃連黃柏各一兩乳香沒藥各五錢為末細茶汁調敷諸瘡腫痛杏仁去皮研濾取膏入輕粉麻油調搽效濕毒成瘡梧桐子燒灰和菜油塗疽毒自髒髮外不焮赤腫陰症也獨蒜杵爛麻油和厚敷之疽毒不起極細鐵屑將好醋煎二三沸撈醋中鐵屑鋪於患處將上好活磁石一大塊頻頻吸之陰疽艾葉一斤硫黃雄黃各五錢煮半沸搗爛候溫敷冷再易知痛可生諸瘡潰爛不愈木耳焙乾研末白砂糖等分用溫水調敷瘡爛成孔糯米甑上氣水以瓷盤承滴頻搽癰疸發背大如盤具不可近桐葉酢蒸貼上退熱止痛漸漸生肉極驗潰癰作癢以鹽摩其四圍即止一切癰疽金瘡破爛生蛆諸藥不效者用海參切片焙乾研敷蛆皆化黃水流出再用生肌藥收口即愈諸瘡生蛆緑礬研末摻生麻油渣貼之綿裹當有蟲出諸瘡成管大蒜梗燒灰搽即脫癰瘡胬肉烏梅肉燒研敷惡肉上一夜可消大一半胬肉不退硫黃研細末敷上即退再用泡過茶葉五兩烏梅三個燒存性共研敷之即收口擠膿用力太過致胬肉如梅如栗久不縮入乃損傷氣脈使然大熟地炒枯一兩烏梅肉炒炭三錢研細摻膏藥上貼之再用粉霜收口疽瘡骨出黃連牡蠣等分研末先以鹽酒洗過敷瘡久敗壞成骨疽剝鼠皮一塊貼腫上即膿出附骨疽漏蜣螂七枚同大麥搗敷骨疽膿出黑色鯽魚一個去腸入白鹽令滿扎定以水一盞石器內煮至乾焦為末豬油調搽作痛忍之瘡口乾燥以醋淬自然銅白芷名二錢黃連白蘞各一錢麝香少許再以自死竹蘸豆油點著以碗承取滴下油瀝調前藥末雞羽蘸塗膿汁自止長肉收口生肌血竭象皮蚌殼灰大貝母龍骨各一錢赤石脂熟石膏各二錢兒茶八分乳香六分研末摻膿淨不合先以槐枝蔥白煎湯洗後用瓦松陰乾為末敷又方濃煎棗湯洗再以鱉甲煅研摻瘡口不斂絲瓜藤根煎水塗又方鯽魚燒灰和醬塗又方石膏燒研二兩黃丹五錢摻又方秦艽為末摻又方經霜桑葉研末敷癰疽不斂瘡口太深絲瓜搗汁頻抹又方斂瘡生肌黃柏末麵糊調塗癰疽不斂不拘發背一切瘡鱉甲燒存性研摻甚效眉疽載眉門對口活鯽魚一尾去腸鱗搗爛加發垢四兩白蜜少許攪勻從瘡外圈入敷須極厚留孔出氣又方雄豬眼梢肉三錢剁爛加滑石末四錢和勻敷患處頂上似膏藥蓋之拔去僵肉出黃水愈兼分載頸項門肺風瘡酒磨鹿角尖濃塗久之自愈腸癰馬蹄灰以雞子白和塗腹上拔氣老鼠瘡用死貓頭燒灰棉油調搽繞指毒瘡生手足指上以活田螺一枚生用搗碎敷愈瘡如人面以小葦撬其口煎貝母灌之誤服附桂必生癰疽名曰附毒勿取敗毒涼藥任其腐潰止用六一散摻之自腐去收功石癰如石堅硬不作膿者生商陸根搗擦之燥即易取軟為度天行斑瘡頭面及身須臾周匝狀如火瘡皆戴白頭漿水逐次隨生不急治必死蜜水通搽瘡上再以蜜煎升麻拭之內以蘆根湯煮粥食疔門疔腫初起多年土內鏽釘火煅酢淬刮下鏽末入乳和挑破敷之又方生煤一塊冷水磨少許新墨蘸塗疔上治疔用患者耳垢齒垢手足指甲屑和勻如豆大放茶匙內燈火上炙少頃取作丸將銀簪腳挑開疔頭抹入外用棉紙一層浸濕覆之疔腫絲瓜葉援貼疔毒嚼生黃豆塗或煙管中煙油厚敷四圍頭留出少刻疔破出水而愈疔瘡惡腫田螺入冰片化水點瘡上又方黑牛耳垢敷疔腫惡毒刺四邊及中心以雄黃末敷驗又方紫花地丁搗汁服神效疔毒腫不破則入腹蟬蛻殭蠶等分為末酢調塗四圍候根出拔去再塗疔瘡中風腫痛驢屎或馬屎炒尉瘡上數十遍效疔腫垂死刺破瘡頭入糞封之干即易一日除根魚臍疔四面赤中央黑凹臘豬頭燒灰雞子清調敷日數易又方蔥白蜂蜜杵塗四圍水疔色黃麻木不痛暗疔瘡凸色紅使人昏狂並以金或銀三稜針忌鐵針刺患處四畔後用銀杏去殼浸油中年久者杵爛罨面上生疔腫大活蝦蟆一隻劃開胸前取肝下貼疔上疔生唇上在大腿彎紫筋上委中穴用銀針刺出血又方蛔蟲搗爛塗效手足間有黃泡即起紅絲一條走人心腹令人悶亂名紅絲疔因大喜怒氣血逆行急用針於紅絲所到處刺之擠出惡血再細嚼浮萍草根敷之又方此疔多生臂肘間先用針挑斷紅絲隨將多年糞坑上碎木板煅灰研細飴糖和塗紅絲並疔四圍中間留頭疔即破出又方煙桿中煙油離絲三分敷絲即不走羊毛疔用貓尿灌耳貓屎塗鼻尖魚睛疔瘡枯礬末寒食麵糊調貼消腫無膿拔疔根用銀針挑開疔頭以蒼耳草蟲研末摻膏藥中心對疔頭貼有水流出疔根自撥效又方黃蟾酥以面丸梧子大每用一丸安舌下黃即出又方時魚靨用手括下不可見水陰乾收貯用時以銀針撥開疔頭將一片銀花湯浸軟貼上清涼膏蓋之一宿揭開其疔連根拔去又方將銀簪刺破疔頭用多年露天鐵鏽研極細三四釐搽入孔內膏藥蓋之疔走黃松香栗子同嚼爛以渣塗又方看大眼角紅筋刺破見血愈赤遊門赤遊火丹芭蕉根搗爛塗又方新生荷葉杵爛入鹽塗又方蜒蚰搗爛磨好京墨汁和塗又方冬青樹葉搗爛和入雞子清敷患處以絹縛一周時又方生麻油塗浸並飲之又方水調芒硝末塗又方藍靛塗效白遊風腫螺螄肉入鹽少許搗泥貼效白遊腫簇上白自臭死蠶搗塗赤遊腫用赤者小兒黑丹青羊脂熟摩病上日三五度如無青羊白羊亦可赤黑丹疥或癢或燥遍身即死者白瓷末豬油和塗五色丹毒俗名遊腫犯者多死以榆白皮末雞子白和塗小兒兩足赤遊流火如至小腹胸膛多危用馬蘭頭汁冬季無葉取根搗絞汁雞毛蘸搽燥則再換如頸項腿肋縫中潰爛以此汁調飛淨六一散小兒火丹發足趺起正赤者寒水石硝石各半兩莽草一兩水調塗火灶丹毒從腳起如火燒五茄皮根葉燒灰五兩取煅鐵家槽中水和塗又方乳香末羊脂調塗小兒火丹發從兩股起及臍走陰頭李樹根半斤燒灰為末取田中流水調塗又方桑白皮切一斗水二斗煮一斗浴小兒丹發兩膀里尻間正赤流至陰頭赤腫血出薺葉三兩赤小豆一合煅爐門上灰一兩青羊脂三兩蔥白二莖切和搗膏摩燥則加水摩又方蠶沙一升水煮去滓洗丹從臍起檳榔末油調敷腋腰丹毒青紫者羚羊角煅研雞子清和塗小兒丹初發兩脅及腋下腿上謂之殃火丹山梔子仁四兩生鯽魚半斤同杵如泥每酢化少許塗丹上丹