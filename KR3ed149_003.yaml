不痛水微暖復痛易新水又方以木碗合螫痛驗蠍螫麻油塗又方白砂糖按揉又方芋頭或荷梗擦蠍蠆螫人半夏末水調塗立止又方蟹殼燒研末蜜調塗蠼螋二須多足狀如小蜈蚣色青黑長足隱於壁間以尿射人影遍身生瘡如痱出黃水作寒熱甚於湯火統身匝即死烏雞翎燒灰雞子清調塗小兒蠼螋咬速搗蒺藜葉或子敷又方燕窩中土豬脂和敷干即易蚯蚓咬人其毒如大風眉須皆落石灰水浸良又方濃煎鹽湯浸洗小兒陰被蚯蚓呵腫令婦人以吹火筒吹其腫處即消戴毛刺甘草煎濃湯浸洗砂糖搽之又方菜油塗忌用熱湯洗狐尿刺瘡杏仁研爛煮一兩沸及熱浸之冷即易蠶咬傷苧汁塗又飲之蛇咬萵苣葉或子浸胖和雄黃末搗敷又方人中白唾涎調擦稻草或茭白燒灰菜油調塗又方婦人尿或暖酒淋洗隨用扁豆葉或大蒜搗爛塗蛇骨刺人鐵精粉一豆許吹入瘡內蛇傷發腫生蠶蛾研敷蛇咬久潰成瘡小茴香搗末敷蛇繞不解熱湯淋即解蛇人口不得出用刀破蛇尾納生椒二三粒裹定須臾即自退出蛇入七孔割母豬尾血滴入即出毒蛇咬螫閉口椒及葉搗封之良鼠咬麝香罨又成瘡者貓頭毛燒灰油調敷以瘥為度為貓所傷薄荷葉細嚼敷又成瘡者雄鼠屎燒灰油和敷效尋常犬咬黃牛屎塗又方木鱉燒灰敷又方蚯蚓泥以鹽研敷出犬毛效猘犬咬先以水洗淨犬牙之垢擠出毒血隨用蠶豆葉搗塗又方於患人頂心中有一紅髮即拔去再服藥效又方婦人溺淋洗又方以醬塗之犬咬傷潰久不收真虎骨煅細末摻之又方咬傷成瘡爛嚼杏仁塗豬咬松香熬貼又成瘡者龜板燒研末香油調搽馬咬豬肉同飯自嚼敷又方皂角子燒灰麻油和塗馬咬成瘡腫痛雞冠血塗駁馬用雌雞牡馬用雄雞馬咬傷潰爛馬齒莧煎湯日日服瘡口以馬鞭子或籠頭索燒灰摻之效牛觸腸出不損者急送入以桑白皮尖或生白麻為線縫合縫上摻血竭末或百草霜末血止立活又方脅破腸出臭穢急以香油摸腸用手送入煎人參地骨皮湯淋洗其皮自能合吃羊肉羹十日猢猻抓傷潰爛金毛狗脊焙研摻之或麻油調搽虎咬嚼栗塗並恣飲酒又方真麻油洗並灌虎爪傷人刺蝟脂日日敷內服香油被虎咬瓜傷蠶豆葉搗敷如無蠶豆水浸軟連皮搗敷虎熊狼爪傷生鐵煮汁洗再嚼小米塗或乾薑末敷夏月雜色毛蟲極毒觸人生瘡癢痛骨肉皆爛豉一碗清油半盞同搗厚敷傷處經宿豉中有毛蟲棄埋土中白芷湯洗後烏鰂骨末敷
