body:
  text: 䱐溪外治方選卷上關竅門九竅出血牆頭苔蘚杵爛塞之又方車前草汁滴入又方龍骨末吹之九竅及髮根出血不因中毒者乃極虛欲脫之證急取泉水一桶燒酒一斤扶病人坐定裸其腿以燒酒淋之俾酒從踝下即滴入水桶內淋訖將其腿浸入桶中其血即止再令壯年乳婦以乳哺之再用海參一斤切片焙為末每三錢調服日三次蓋海參能補百脈之血諸補藥所不及也筋門轉筋酢煮羊毛裹足轉筋遍身入肚不可忍者極鹹鹽湯於盆中暖浸之肝臟氣虛風冷搏於筋遍體轉筋入腹熱湯三斗入鹽半斤稍熱浸之風襲經絡筋攣骨痛炒蔥白布包熨攣閃傷筋結核腫痛若使成毒最難治療初覺急用火酒燉溫手蘸輕拍患處數百下隨以韭菜杵爛罨一周時次日再拍再罨以瘥為度極效初拍覺疼宜忍之拍久則不疼矣骨門渾身骨痛破草鞋燒灰香油和貼痛處筋骨痛浮萍槐子熬湯洗風襲經絡筋攣骨痛炒蔥白布包熨附骨疸載癰疽門身形門身體麻木芥子末酢調塗之虛怯入肢體生腫塊或痛或不痛炒蔥白布包熨卒然瞀悶遍身紫泡將泡刺破可收而蘇蘇後飲甘草節綠豆等以敗毒皮膚門皮中如有蟲行風熱也鹽一斗水一石煎湯浴之小兒初生無皮色赤但有紅筋掘土坑臥之即長皮又方白旱米粉干撲於上久用又方伏龍肝雞子清調塗肌肉門針刺入肉刮象牙末水和罨或熱小便漬又方銀杏去衣心杵爛菜油浸良久取油滴瘡孔竹木刺入肉中白梅搗爛罨又方以頭垢罨各骨入肉山楂研末茶調敷槍子入肉南瓜瓤敷汗門盜汗自汗五倍子去蛀炙乾研末男用女唾女用男唾調厚糊填臍中貼過宿勿令泄氣自汗不止何首烏末津調封臍中又方鬱金末臥時調塗乳上又方粳米粉絹包頻頻撲盜汗陰汗麻黃根牡蠣粉為末撲腳汗白礬一兩水二升煎洗瘥發熱門小兒發熱不拘風寒飲食時行痘疹並宜用之以蔥涎入麻油內手指蘸油摩擦小兒五心頭面項背諸處瘧門祛瘧蛇蛻研末塞兩耳內效截瘧常山草果川烏陳皮甘草各一錢絹袋盛貯煎於鼻間只聞香氣又方胡椒雄黃各五釐和飯研為丸放臍內膏藥蓋之小兒瘧疾不能服藥以黃丹五錢生礬三錢胡椒二錢半麝香五釐共末好醋調敷男左女右手心絹包手掌藥熱汗出而愈一方可效三人鬼瘧日發鬼箭羽鯪鯉甲燒灰二錢半為末每以一字發時搐鼻三陰瘧久不愈用麝香一分冰片一分硃砂一錢二分五釐花椒二錢五分共研細末分摻兩膏藥一貼背脊第三椎肺俞穴一貼當臍效痛痹門痹證川芎一兩生薑三兩蔥一把水煎熏洗又方燒酒糟出甑時乘熱將骽足插入熏洗數次效風濕痛生薑搗汁和黃明膠熬貼妙風濕身痛生蔥擂爛入香油數點水煎調芎藭鬱金末一錢服取吐痛風歷節四肢疼痛蔥白杵爛炒熱熨之風痹走注疼痛及四肢頑痹強硬屈伸不得皂莢一斤不蛀者食鹽五升細銼皂莢和鹽炒熱以青布裹熨痛處瘥手足麻木不知痛癢霜降後桑葉煎湯頻洗癱痿門癱瘓酒炒蠶砂鋪床上臥間日一作又方醋蒸黑大豆鋪床上臥厥門寒證厥逆硫黃白芥子末填臍暴死門卒中暴死兩人以竹管吹其耳又方薤搗汁灌鼻中又方生半夏末或皂角細辛末吹鼻並吹耳卒死目閉騎牛臨面搗薤汁灌耳中研皂莢末吹鼻中效卒死無脈無他形候鹽汁塗面上牽取牛臨鼻上使牛舐之瘥中惡卒死蔥心黃刺鼻中男左女右人七寸血出效並刺入耳中五寸小兒無故卒死蔥白納入下部及兩鼻孔內氣通或嚏即生小兒卒死或病痛或常居寢臥奄忽而卒皆是中惡以蔥葉刺耳男刺左女刺右令入七八寸出血言痛為度又方視其上唇裡弦有丸如黍米大以針決去之卒魘死搗韭汁灌鼻孔中劇者兼灌兩耳鬼魘不寤伏龍肝末吹鼻中小兒客忤菖蒲汁納口中中暍不可使得冷得冷便死用熱泥繞病人臍令人溺其中令溫缺一角使能流輪使多人溺熱暍取道上熱土壅心上少冷即易氣通止斑疹門風疹芭蕉根搗爛塗之風瘙癮疹赤小豆荊芥穗等分為末雞子清調塗麻疹不起氣悶脂麻五合杵碎沸水泡乘熱熏頭面疹發不出面目腫脹氣喘垂危者用大蔥頭杵爛放在大銅盆內上用木架架之再以大被單罩蓋停當大人抱定小兒睡在上面然後將沸湯衝入蔥盆內熱氣熏蒸俟稍溫即抱出切不可露一絲之風直待汗乾即瘥疹發熱時腹痛商陸根和蔥白搗敷臍上疹後喉病苦參三錢殭蠶二錢為末吹身面赤斑癢痛或瘭子腫起不治殺人羚羊角燒灰雞子清和塗妙傷寒發斑用銅錢於胸背四肢刮透再用煮雞蛋去殼乘熱滾擦斑毒以羚羊角燒灰研細雞子清和塗斑如錦紋紫黑熱極胃爛也多死姑以豬膽汁調芒硝青黛末雞毛掃之或救一二痘門預解痘毒七八月間或三伏日或中秋日剪葫蘆須如環子腳者陰乾於除夜煎湯浴小兒則可免出痘痘初起發熱用手蘸真麻油摩其背脊下至尻骨如此數次其熱自退麻痘解穢茵陳研末棗肉搗丸焙乾常燒煙薰衣服痘毒初起綠豆黑豆等分為末醋調頻塗解痘毒生螃蟹和飛羅面搗膏貼患處痘毒泡過茶葉曬乾為末五倍子等分雞子清調敷又方哺雞蛋殼炙麻油調搽又方生黃豆口中嚼爛塗之不必留頭數次即消痘毒已爛糯米粽尖焙灰冷定同百草霜研勻摻痘瘡作癢房中燒茶葉熏又方上好白蜜湯和以翎頻刷痘瘡潰爛枇杷葉煎湯洗再用海螵蛸末或綠豆末敷又方黑大豆研末敷又方荍麥粉敷又方青茶葉滾水略泡攤草紙上覆以絹臥兒於上任其輾轉痘瘡生蛆用嫩柳葉鋪席上臥之其蛆盡出痘瘡黑陷沉香檀香乳香等分蒸於盆內抱兒於上熏之即起痘瘡赤瘢雞子一個酒醅浸七日白殭蠶二七枚和勻揩赤瘢塗之效防痘入目胭脂嚼汁點之天花出在眼中新象牙磨水滴入眼即退出痘目生翳障豬蹄爪甲煅灰泡湯濾淨洗痘抓破白螺螄不拘多少片腦少許香油調搽患處小兒暑月出痘潰爛不能著席夾褥裝麩皮藉臥痘疔青蔗曬乾真香油點燈燒成灰以津液調勻銀針挑破點之立效又方雄黃一錢紫草三錢為末胭脂汁調先以銀針挑破搽痘不落痂雞子黃炒油雞翎蘸掃又方以蜜頻拭且無瘢痕痘後翻疤膿水潰蔓延赤石脂一兩寒水石一兩大貝母七錢為末乾摻痘後翻疤新象牙三錢兒茶錢半殭蠶炒斷絲二錢珍珠三錢為細末油胭脂調塗毒水如注漸漸收口痘後生瘡生黃豆研末麻油調搽痘後癰毒赤小豆末雞子白調塗又方嚼生黃豆塗之即潰黃疸門黃疸雄鯽去頭骨胡椒十粒研細麝香三分同舂爛將蛤蜊殼填滿合病人臍上用絹縛緊遍身黃疸茵陳蒿一把生薑一塊搗爛於胸前四肢日日擦之發黃甜瓜蒂一兩炙為末男左女右每日搐鼻數次黃水流出愈傷寒發黃搗韭根澄清取二三滴滴入鼻中即出黃傷寒發黃目不識人生蔥煨熟取心批出汁蘸香油點兩目大小毗立明傷寒發黃昏悶不省死在須臾烏骨雄雞一隻去毛及腸屎以刀攔切鋪心頭上少頃即蘇頭門卒病頭痛皂角末吹鼻取嚏頭痛蠶砂二兩川芎五錢殭蠶如患者年歲之數水煎另以厚紙糊鍋上中開錢大一孔藥氣熏出以患處就之每日一次久痛者三五次除根又方斑蝥去頭足翅裝蜆殼內罨痠痛處過夜起泡挑破頭痛不止楊梅為末以少許搐鼻取嚏妙偏正頭痛鱧腸草即旱蓮草取汁滴鼻中又方生蘿蔔汁一蜆殼仰臥隨左右注鼻中效又方穀精草一兩為末白麵糊調攤紙花中貼痛處干換頭痛連眼穀精草末調糊塗腦頂又方韭菜子薑汁調塗太陽卒中惡風頭痛鹽一升為末麻油二升煎一宿令消盡塗頭石鹽尤良風寒頭痛麻黃去節研同杏仁搗泥貼太陽又方醋炒蕎麵為兩餅更換覆額上取汗太陽風寒頭痛生薑三片桑皮紙水濕入灰火中煨熟乘熱印堂兩太陽各貼一片以帶纏之風熱頭痛大黃朴硝各等分為末井底泥和捏作餅貼兩太陽穴又方薄荷青黛石膏芒硝末塞鼻寒濕頭痛逢陰雨則發紫蘇川芎花椒煎熏又方桂心末酒調塗額角及頂上濕氣頭痛瓜蒂末松蘿茶搐鼻取黃水受暑頭痛嗅皂角末取嚏大熱證頭痛大黃芒硝末井泥調塗太陽又方朴硝塗頂熱痰頭痛牛蒡子搗汁加鹽酒熬膏頻擦太陽宿食不消飽則濁氣熏蒸致頭脹痛蒼朮厚朴陳皮末搐鼻肝風頭痛霜桑葉煎熏聞病人汗氣入鼻透腦散布經絡而覺頭痛芥菜子末溫水調稠填臍內隔衣以壺盛熱湯熨之時病初愈餘毒攻注頭腦脹痛蔥汁酒磨紫金錠塗太陽頭風山豆根為末油調搽兩太陽又方天南星一個艾五錢煎湯熏之頭風頭痛綠豆作枕頭風掣痛蠟二斤鹽半斤香油一兩和鎔令相入捏作兜狀合腦蓋至額頭風熱痛決明子炒研茶調敷兩太陽穴干則易腦風頭痛不可忍遠志末搐鼻寒頭風炮附子末加鹽摩痛處久患頭風甘菊花去蒂裝枕頭風畏冷荍麥粉二升水調作二餅更互合頭上微扦即已頭風白屑牛蒡葉搗汁熬稠塗至明日皂莢水洗去又方桑灰淋汁沐良又方山豆根浸油日塗偏頭風久不愈者晴明時將發分開用麝香五分皂角末一錢薄紙裹置患處以布包炒熱鹽熨之冷即易數次效偏正頭風天陰風雨即發桂心末一兩酒調塗額上及頂上暑天怕風欲綿裹頭極重之症鵝不食草陰乾上好燒酒浸一宿日問曬乾晚間又浸如此七次右邊痛塞右鼻左邊痛塞左鼻鼻流冷水愈頭項風強八月後取荊芥穗作枕及鋪席下立春日去之頭項強不得顧視蒸好大豆一斗令變色作枕又方九月採菊花作枕良頭面風腫杏仁搗膏雞子黃和杵塗帛上厚裹之干則又塗頭皮虛腫薄如蒸餅狀如裹水以口嚼小麥面敷良鱔攻頭敗龜板酥炙末飛面少許和油塗頂留孔出毒不可太稠大頭瘟馬藍頭一把搗汁鵝毛搽上一日五六次熱氣頓出驗抱頭火丹即大頭瘟扁柏葉搗爛雞子清調敷效頭腦鳴響狀如蟲蛀名天白蟻以茶子為末吹入鼻效頭面熱癤經霜芙蓉葉為末或鮮花亦可搗爛用蜜塗患處留頭漸愈小兒頭上軟癤炒脂麻就鍋中乘熱取起嚼爛敷又方蝦蟆剝皮貼又方枳殼去穰周圍用糊合癤上去膿生肌效頭面諸瘡芝麻生嚼敷頭瘡先用醋少許和水淨洗去痂再用溫水洗挹干百草霜研入鉛粉少許生油調搽又方五倍子白芷等分研末青油調敷濕者乾摻又方鴿屎研末醋調搽又方生蘿蔔杵爛米醋泡透敷又方大筍殼燒灰量瘡大小生油調敷小兒頭瘡黑豆炒存性研水調敷又方杏仁燒研敷又方龜甲燒灰敷又方燒雞蛋殼和豬脂敷又方石決明草決明末塗太陽小兒頭瘡因傷濕入水成毒膿汁不止紅曲嚼罨之效小兒頭瘡晝開出膿夜即復合四寸長鯽魚一條去腸大附子一枚去皮研末填入炙焦研敷搗蒜封之效小兒頭面患瘡膿汁作癢出水水到即潰用綠豆松香為末麻油調敷又方益元散加枯礬少許麻油調敷頭瘡皮內時有蛆蟲出以刀刮破擠絲瓜葉汁搽之禿瘡鮮蠶豆搗如泥塗干即易三五次愈無鮮豆以乾者水泡搗塗又方海螵蛸二兩輕粉一兩松香三兩共研細油調搽一切禿瘡不落水豬網油攤開將松香細研摻上卷如煤頭燈火上燒著下用蚌殼殼內放生礬末少許受滴下之油乘熱攪勻冷定敷患處頭面黃水瘡流到即蔓延而生蠶豆殼炒成炭研細真菜油調塗頻潤之小兒白禿黑葚入罌中曝三七日化為水洗三七日效又方貫眾燒末麻油調塗又方馬齒莧煎膏塗或燒灰豬脂和塗又方藜蘆末塗小兒癩梨頭鯽魚去腸入皂礬燒研搽又方黃連末敷效頭上生蝨包銀硃紙以碗覆燒之茶清洗下煙子擦之包頭過夜小兒頭面磕撲銅鐵戳傷諸患以龍眼核去黑皮焙搗極細以此敷之愈後無瘢仍生毛髮囟腦門小兒腦熱太陽痛川芎薄荷朴硝各二錢為末以少許吹鼻腦痛硝石搐鼻大寒犯腦作痛蒸吳茱萸作枕腦痛眉痛穀精草二錢地龍三錢乳香一錢為末每用五分燒煙筒中隨左右熏鼻頭腦鳴響茶子為末吹鼻小兒囟腫黃柏末水調貼兩足心小兒囟陷乃冷也烏頭附子井生用去皮臍各二錢雄黃八分為末蔥白搗汁和貼陷處又方水調半夏末塗足心小兒囟軟腫青黛冷水調敷小兒頂軟乃肝腎虛風邪襲入附子去皮臍天南星各二錢為末薑汁調攤貼天柱骨腦縫開裂頭大熱用黑蝨三五百枚搗碎敷小兒解顱生蟹足白蘞各半兩搗末乳汁和敷小兒解顱囟開不合防風柏子仁白及各一兩為末乳和敷二十餘日小兒解顱鼻塞者天南星炮去皮為末淡酢調緋帛上貼囟門熱物熨之枕後生腦痹痰核燒浮石研入輕粉油調塗玉枕瘡原蠶蛾炒石韋等分為末搽腦漏獨蒜搗爛左鼻塗左足心右鼻塗右足心越日去蒜三四日而愈即鼻淵分載鼻門腦漏流膿破瓢白雞冠花白螺螄殼各燒存性等分血竭麝香各五分為末好酒灑濕熟艾連藥揉成餅貼頂門以熨斗熨之眩暈門失血眩暈生地塞耳鼻發門小兒發生遲陳香薷煎濃膏和豬脂調塗禿瘡羊肉切片炙香乘熱遍貼蟲出以鹽湯洗用豬膽汁調雄黃末塗並載頭門吃髮癬煨石膏研末糖調搽發脫川椒四兩浸酒密室內日搽自生發禿不生麻子炒焦研末豬脂和頻塗或以甜瓜葉杵汁塗發不長桑葉麻葉煮泔水頻沐或以桑葉生麻油煎去滓潤髮婦人禿髮川椒四兩酒浸密室內日日塗之病後落髮骨碎補野薔薇嫩枝煎汁刷之發臭薄荷汁或燒灰淋汁沐或以槿樹葉搗汁沐發槁不澤桑根白皮柏葉煎汁沐之木瓜浸油潤之髮結而不通竹瀝少加麻油和勻潤之梳之即通鬢邊疽癤久不愈豬貓頭上毛各一撮煅灰雄鼠糞一粒研末清油調搽眉發落不生先用生薑擦三次後用生半夏為末麻油調塗面腮門面赤杏仁去皮尖杵泥雞子清調塗早晨鹽湯洗之兩頰赤癢其狀如疿杏仁頻揩腮腫絲瓜研末水調敷傷風面腫杏仁搗爛敷時行腮腫柏葉末調蚯蚓糞塗腮頰熱腫赤小豆末和蜜塗一夜消或加芙蓉葉風熱腮腫絲瓜燒存性研末水調搽搭腮腫赤小豆為末雞子清調貼或酢調面腫如蛇狀濕磚上青苔一錢水調塗身面腫滿雞子黃白相合塗腫處干再上被打頭面青腫羊肉牛肉或豬肉炙令熱貼腫上愈鸕鷀瘟兩腮腫脹憎寒惡熱赤豆末水調敷腮內痠痛者曰痄腮不痠痛者曰發頤煎赤豆側柏葉雞清搗塗又方絲瓜燒灰雞子白調敷又方皂角南星末生薑汁調敷痄腮陳石灰不拘多少燒七次地土窨七次醋調敷又方靛沫敷或青黛亦可效又方濃煎蔥湯頻洗又方山梔末飛面各等分豬膽汁好酒各半薄調敷患處病後腮上紅腫名穿腮與發頤同載耳門耳後紅腫條腫在地閣名穿喉治法亦同穿掌腮毒新桑葉搗爛塗頭面諸風皶皰用杏仁末雞子白調塗面上皯皰鹿角尖磨濃汁厚敷效面上瘢靨蒺藜子山梔子等分為末醋和夜塗旦洗年少氣盛面生皰瘡糜鹿豬塗面生子地膚子生明礬煎水洗再用狗尾草搗塗數日效面黶痣點蔓菁子研末入面脂中夜夜塗之或取油用面䵟𪒟以豌豆擦之預防粉滓平時敷粉用中指研調則免粉滓亦名粉刺滑石輕粉杏仁去皮尖等分為末蒸過入冰片麝香少許以雞子清調勻靧面畢敷又方桃花冬瓜仁等分研蜜調夜塗旦洗雀斑白芷甘菊花去梗各三錢白果二十個紅棗十五個珠幾粉五錢豬胰一個將珠兒細研余俱搗爛拌勻外以蜜拌酒釀燉化入前藥蒸過每晚搽面清晨洗去又方每夜用漿水溫洗將布揩赤再用白檀香磨汁塗又方鹿角燒灰豬油調搽又方白附子生研臥時豆腐擦後雞子清調塗雀斑酒刺白屑瘋皮作癢真綠豆粉八兩滑石一兩白芷一兩白附子五錢為細末每晚用數錢搽面粉刺面䵟白殭蠶黑牽牛去皮杏仁等分共研細末洗面時擦之面上皺路大豬蹄四枚洗淨煮如膠臥時用塗面工次早以漿水洗去半月後面皮細潔如童又方桃花或荷花或芙蓉花並以冬雪水煎湯久洗面上毒瘡初起小蜒蚰一二條醬少許共搗塗紙上貼留一小孔出氣效面上生瘡腫大活蝦蟆一隻劃開胸前取肝下貼瘡上面上惡瘡不可名識者柳葉或皮水煮汁入少鹽頻洗面上黃水瘡流到即生蔓延無休蠶豆殼炒成炭研細加東丹少許真菜油調塗頻潤之小兒甜瘡生於面耳母嚼白米臥時塗三五次小兒頭面患瘡膿汁作癢出水水到即潰者載頭門小兒面瘡出黃水鯽魚頭燒灰研末和醬清汁敷日一易小兒面瘡爛成孔臼蒸糯米時甑蓬滴下水承取掃之效指爪抓破面目橄欖磨水搽下頦落烏梅含一個即上耳門耳鳴椒目巴豆石菖蒲等分研末松脂黃蠟和為挺納耳中抽之日易耳嗚耳癢似流水風聲生烏頭乘濕削如棗核塞耳早塞夜易耳鳴耳痛鹽五升蒸熟布裹枕耳冷即易耳閉細辛石菖蒲木通各一分麝香二釐共為細末綿裹塞耳中即愈耳中氣閉用杏仁燒灰存性入麝香少許吹入即愈耳聾用芥菜子搗碎以人乳調和綿裹塞耳數易之即聞又方細辛末鎔黃蠟丸鼠矢大棉裹塞數次戒惱怒耳卒聾閉巴豆一粒蠟裹針刺孔通氣塞之效又方蚯蚓入鹽安蔥內化水點之效久聾暴聾亦可甘遂半寸綿裹塞耳中甘草半寸嚼口中即通腎虛耳聾真磁石一豆大穿山甲二片燒存性研末綿包塞耳口含生鐵一塊覺耳中有風水聲即通亦抬暴聾又方以活磁石五分入聾耳生鐵搗碎綿包入不病耳自然通透勞聾已久童便乘熱少少頻滴之病後耳聾生菖蒲汁滴或童便乘熱滴或龜溺滴小兒耳聾老鼠膽汁灌之為貓嚇破之膽汁更佳耳聾耳鳴生地黃灰火煨綿裹塞耳頻易以瘥為度耳內痛用錢磨水滴之又方菖蒲自然汁灌耳效耳內忽大痛如有蟲在內奔走或血水流出痛不可忍蛇蛻皮燒存性為末吹入耳中愈又方滴貓尿入耳痛不可忍磨刀鐵漿滴入愈耳內大痛或至流血用蛇蛻焙末吹入即止耳腫痛經霜青箬露在外將朽者燒存性為末敷病愈耳後紅腫頭重體倦名發頤痰熱餘毒積於經絡也南星熬膏敷耳腮痄腫蝸牛同面研敷耳爛燈心陳皮各一錢燒灰加冰片一分研吹大人小兒耳內膿水海螵蛸末一錢枯礬一錢麝香一分干胭脂五分燒灰存性共為細末吹入耳內即愈耳內流膿雞冠血滴耳中膿水不幹石榴花炙脆研末加冰片再研吹耳內出膿胭脂枯礬釘鏽粉等分吹之耳中膿水不止龍骨枯礬干胭脂海螵蛸各等分麝香少許為末先以綿紙捻干輕吹耳內耳出水橄欖連核燒灰青黛末摻耳中腫痛出膿血黃魚牙炙末退火氣研末加冰片少許菜油調雞毛蘸入耳中又方橄欖核燒灰冰片二釐研細末吹入耳衄耳中出血也龍骨末吹之即止又方陳皮燒灰研末入麝香少許吹之效又方炒黑蒲黃研末吹之聤耳有膿先以紙條絞淨用菖蒲汁滴之或為末吹之即病後耳聾亦效聤耳桃仁熟杵舊緋絹裹塞日三易又方血餘一錢冰片五釐研勻吹之又方乾結不松者白頭蚯蚓入蔥內化水滴滿數次挑出又方大廣陳皮一個炒黑生龍骨一錢冰片麝香枯礬各二分共為細末濕爛者干吹干痛燥癢者麻油調搽聤耳出汁青橘皮燒研末綿包塞之耳疳出汁雞子黃炒油塗妙又方青黛黃柏研末吹之耳疳出膿抱出雞子蛋炒黃為末油調灌之止疼小兒耳疳生於耳後腎疳也地骨皮一味煎湯洗之仍以香油調末搽底耳黃箬燒過棉裹塞或以筆管吹又方桑螵蛸一枚燒存性麝香二分半同研每用分余摻入有膿先絞淨耳中惡瘡雞矢白研敷耳中息肉曰耳菌藜蘆腰黃硇砂各少許為細末點耳中耳內結核痛不可動用好火酒滴之側臥半時即潤起可取小兒甜瘡生於面耳令母頻嚼白米臥時塗三五次瘡生耳邊浸淫流水鱉甲燒灰摻耳上生瘡雞子白敷小兒月蝕生於耳後黃連末敷又方蚯蚓屎煅研豬油調塗小兒甜瘡耳輪前後連引流水蛇床子一兩輕粉三錢為末麻油調搽又方胎火盛者田螺殼研細和冰片麻油調搽耳後髮際搔癢小竅出血此名發泉多年糞桶箍燒灰敷諸蟲入耳以紙塞耳鼻留蟲入之耳不塞閉口不言少頃蟲自出蒼蠅入耳害人最速皂子蟲研爛鱔魚血調灌入耳百蟲入耳椒末一錢入酢半盞浸之良久少少滴入自出又方人乳滴之又方生油調銅綠滴又方桃葉搗汁滴延蚰入耳用濕生蟲研爛塗耳邊自出或攤紙上捻安入耳中亦出又方地龍為末入蔥內化水滴入蜒蚰亦化為水耳中有物麻繩剪令頭散著膠黏上徐徐引出之水銀入耳能蝕入腦以金枕耳即出眉門眉毛落脫垂柳葉陰乾為末以生薑汁於鐵器中調夜夜摩之眉爛毛脫此肝經受風所致側柏葉去根九蒸九曬磨末蜜丸桐子大早晚開水送下一錢菟絲子研麻油調敷眉毛不生芥菜子半夏等分為末生薑自然汁調搽眉疽生綠豆五倍子等分研末醋調塗小兒眉瘡小麥麩炒黑研末酒調塗又方黑驢屎燒灰研油調塗效目門凡眼病皆血脈凝滯為患黃連當歸赤芍煎洗血得熱則行也點藥黃連為主火眼同雞蛋清攪如水點虛眼同人乳點陽症加朴硝血虛加當歸氣虛加黨參每年九月二十三日桑葉煎湯洗目一次永絕昏暗老能細書點眼冬天取淨臘雪將大荸薺同雪水磨粉曬乾加冰片少許入鵝毛管中點眼效瞽目重明冬至日取大蘿蔔一枚開蓋揠空入新生殼雞蛋一個嵌蓋藏淨土中約四五尺深夏至取出卵內黃白俱成清水點諸目疾俱效目疾時作甘菊花去蒂裝枕眼痛老黃瓜一條開小孔去瓤入芒硝令滿懸陰處待硝透出刮下吹點暴發眼痛火硝四錢黃丹乳香沒藥各二錢雄黃一錢研含水吹鼻眼癢蟬蛻菊花煎洗赤腫童便洗雞蛋煮熟閤眼胞目赤癢痛黃連少加明礬人乳浸蒸點角暴赤眼痛黃連一分研細末入雞子白碗中久攪自白沫上浮連點之目熱赤痛以田螺取汁入鹽少許點之眼赤腫痛侵曉以自己小溲乘熱指抹點又方朴硝置豆腐上蒸化取汁收點又方決明子炒研茶調敷兩太陽穴干則易赤目眥痛龍膽草熬膏點之赤眼澀痛白薑末水調貼足心妙火眼赤痛五月取老黃瓜一條上開小孔去瓤入芒硝令滿懸陰處待硝透出刮下留點眼效赤絲亂目青魚膽汁和蜜敷目眥凡膽皆治目鯉膽羊膽亦可蓐內赤目生地黃切薄溫水浸貼小兒赤眼水調黃連末貼足心目中起星白蒺藜三錢水煎洗之又方荸薺舂汁灑紙上候乾刮下點之又方胡椒韭葉薺菜根橘葉菊葉鵝不食草廣皮木鱉白豆蔻川芎不拘何味綿裹塞鼻皆可又方丁香黑棗塞不患一邊鼻星斗上時去之胬肉杏仁去皮尖自己生嚼點或雄麻雀屎男孩乳調點又方鮮鯽魚一片中央開竅貼眶上日三五易胬肉瘀突硼砂少入冰片點之胬肉急起遮目鐵鏽磨水滴胬肉赤白膜蛇蛻麻油炒勿焦人乳調點胬肉菌毒川連杏仁各一錢歸尾赤芍地膚子菖蒲各二錢羌活五分白礬三分煎洗胬肉攀睛杏仁去皮尖研膏人乳化開日點三次又方海螵蛸一錢辰砂五分乳細水飛澄取以黃蠟和收臨臥火上旋丸黍米大揉入眥中天明溫水洗下赤治外障極厚者眼翳指甲磨人乳點或象牙磨人乳點又方皮硝煎水洗又方麻雀糞男用尖而立者女用圓而倒者甘草水泡一夜焙乾研末調入人乳滴目目翳重者豬膽皮燒灰點翳障遮睛鹽研細末以燈心點患上生翳鵝兒不食草搐鼻塞耳貼目皆可效赤翳枸杞子搗汁日點三五次赤翳攀睛者海螵蛸為末蜜和點赤目生翳枸杞子搗汁日點數次又方荸薺杵汁澄粉點目生翳障芒硝一兩銅器中急火煉冷後每夜點兩眼角不論年歲深遠眼生翳膜遠視香暗但瞳神不破者光淨馬牙硝厚紙裹按實安懷內著肉百二十日取出研粉入冰片少許同研細以兩米許點遠年攀睛翳障炮指甲一分山甲蟬蛻各五釐蛇蛻分半哺退雞蛋殼白皮二分人乳炒研每用三釐含水吹不患一邊鼻又方鵝不食草炒蝟皮各三分桔梗四分如前吹鼻遠年目障鵝兒不食草川芎青黛各等分為末搐鼻取嚏小兒目翳或來或去漸大侵睛雪白鹽少許燈心蘸點日三五次不痛不礙效眼目赤爛緊閉目以熱湯或薄荷荊芥防風煎湯沃之風眼赤爛明淨皮硝一錢水二碗化之露一宿濾淨澄清朝夕洗目三日紅消雖久病亦愈爛眼蠶砂麻油浸塗又方黃連煎汁以甘石收敷又方海螵蛸入冰片敷風眼爛弦青黛黃連泡湯日洗又方真麻油浸蠶砂二三夜研細塗患處效又方五味子蔓荊子煎洗新產小兒胎毒二目紅赤澀閉腫爛不開蛐蟮泥搗塗囟門干則再換三次即愈又生南星生大黃等分為末用醋調塗二足心冷淚黃連人乳蕤仁少加炮薑炭熬點姜以劑連之寒也又方香附蒼朮椒目末吹鼻迎風流淚甘石海螵蛸冰片點又方霜後不落桑葉煎好入芒硝少許日日熏洗又方青魚膽和人乳蒸三次露三次點眼角再桑葉煎洗眼漏流膿閉目熱牛糞敷胞上或柿餅搗塗眼下空處生癤出膿流水不幹日久成漏柿餅去皮取肉搗爛塗田螺頭眼野荸薺豬胰等分搗和用雞子殼半個放藥在內臥時合印堂上俟水流入目中翳隨淚出目中息肉淫膚赤白膜馬齒莧一握洗淨和芒硝末少許綿裹安上頻易眼癬用銀杏葉泡湯少加枯礬末溫洗漸愈奇效又方大碗幕布以晚米糠置布燃糠有汁滴碗取搽患處痘風眼癬用蛔蟲洗淨捶爛夏布絞汁加冰片少許調搽活五穀蟲亦可眼皮生珠紅腫癢痛俗名偷針食鹽三錢明礬二錢泡湯洗偷針生地南星搗貼二太陽穴或蛇蛻皮貼或豬精肉貼或白及磨水點眼生珠管牛膝並葉搗汁日點數次又方生蜜塗仰臥半日洗去日一次痰核生於眼胞推之移動皮色如常硬腫不痛者醋磨南星敷或指甲擠出白粉即愈疣目雞內金擦之自落眼皮生瘤櫻桃核磨水頻塗斑瘡入目白柿日日食之良小兒目中生痘黑狗耳上刺血點又象牙磨汁點拳毛倒睫石斛川芎等分為末口內含水隨左右搐鼻日二次毛倒睫五倍末蜜調敷眼胞自起忌摘摘之復生更硬頭風射目必瞎用蕎麥末水調作餅如錢大安眼四角各以豆大一炷之艾灸之即效風火眼童便煎甘菊湯頻洗頭風目盲野莧菜煎湯注壺內塞住壺口以雙目就壺熏之頭風損目以大川母一粒白胡椒七粒共研末蔥白汁丸如柏子大以膏藥蓋貼太陽穴目可重明眼暗柴胡決明子研末人乳調敷目上久久目視五色暈花白菊花和童便煎洗眼昏花用童便煎菊花洗數次即愈久昏白菊花川花椒各三錢膽礬三錢五分青礬銅綠各二錢五分烏梅去核一個新繡花針七枚將藥研細末水調同針入磁瓶內封浸七日隔水煮六個時辰針化為度去渣取水點奇效老眼桑皮皮硝煎洗或加黑豆菊花又方蕤仁同蜜熬點女貞子亦可久病青盲白犬生子目未開之乳頻點之狗子目開即瘥目卒不見用錢於石上磨汁注眥中眼傷青腫生豬肉或生羊肉貼之又方生半夏為末水調塗物傷睛突輕者瞼胞腫痛重者目睛突出但目系未斷者即納之急搗生地黃綿裹敷再以避風膏藥護其四邊眼睛突出一二寸新汲井水灌漬睛中數易自入打傷四圍眼突出者豬肉摻當歸赤石脂末貼損目破睛牛口涎日點二次須要避風黑睛破亦效暑月行路眼昏薄荷葉揉汁滴小兒腦熱常欲閉目大黃一分水三合浸一夜一歲兒服半合余者塗頂上干即再上小兒腦熱好閉目或太陽痛或目赤腫川芎薄荷朴硝各二錢為末以少許吹鼻中凡物入目食鹽泡水洗之塵物入目刮左手爪甲末燈草蘸點之自出又方生藕汁滴入泥沙入目嚼牛膝搓丸塞眼角左眼右嚼右眼左嚼煙矢入目如將他物洗之愈洗愈疼甚至損瞎須用亂髮緩緩揉之自愈石灰擦眼生梔子煎濃汁頻洗又方五穀蟲淘淨搗攤油紙上用布紮好七日不可動藥自落目無恙沙石草木入目中不出雞肝汁注之又方書中白魚和乳汁注目中麥芒眯目大麥煮汁洗之竹木屑眯目蠐螬搗塗之即出飛絲入目石菖蒲捶碎左目塞右鼻右目塞左鼻又方磨濃墨塗看眼內有黑絲用燈心捲去或雄雞冠血滴入看有紅絲捲去又方礬一撮入水碗中以舌舔水一時許絲自在水面又方菘菜即白菜摘汁二三點入目即出又方以筆管吹礬水泡起濺目絲自出又方以頭垢點入目眯目欲瞎地膚子白汁頻注目中指爪抓破面目橄欖核磨水搽鼻門鼻塞鐵鎖磨石上取末豬脂調棉裹塞鼻中鼻塞不通麻鞋燒灰吹之又方大天南星一枚微泡為末淡酢調塗緋帛上貼囟上外熨之鼻塞久不聞香臭者用生蔥分作三段早用蔥白午用中段晚用末段搗塞鼻中氣透自效鼻痛倭硫黃研細冷水調敷鼻流清涕蓽茇末吹鼻淵鼻流臭水也孩兒茶研末吹又方辛夷蕊塞之鼻滴腥水勞倦則發名腦漏與鼻淵涓涓不絕者不同彼宜清散此宜滋養外用石菖蒲搗塞再以生附子末蔥涎調塗湧泉穴或以大蒜切片貼湧泉穴鼻流涕血以醋和土塗陰囊干則易鼻淵鼻衄不止搗蒜貼湧泉穴鼻淵鼻痔雄黃月石冰片研末搐鼻鼻赤大黃朴硝等分為末津調塗又白蘞杏仁白石脂研末雞子清調塗鼻中息肉藕節毛處一節煅末吹之又方膽礬敷又方枯礬和豬脂綿裹塞又方蝟皮炙為末綿裹塞日三易鼻中息肉垂下者片腦點之自入鼻中生菌氣不通白梅肉塞孔中鼻內生疔爛黃雞糞荔枝肉同打爛塗鼻瘡生大黃杏仁等分研末豬脂和塗又方元參末塗之或以水浸軟塞之又方桃葉嫩心杵爛塗又方杏仁研末乳汁和敷鼻瘡膿血臭有蟲也苦參枯礬一兩生地黃汁水煎濃少少滴之鼻蝕穿唇銀屑一兩水三升銅器內煎至一升日洗三四次酒白鹽和津唾常擦妙鼻上酒皶凌霄花半兩硫黃一兩胡桃四個膩粉一錢研膏生絹包揩小兒鼻乾無涕腦熱也黃米粉生礬末各一兩每以一錢貼囪上日再易諸物塞入鼻中而不能出者緊掩兩耳緊閉其口不使通氣以筆管吹其無物鼻孔則所入之物自出諸物入鼻作痛不出羊脂棗核大納鼻中吸入脂消物隨出電鼻擦破貓頸上毛剪碎唾黏敷鼻衄門鼻衄用蔥搗汁入酒少許滴鼻中即覺血從腦上散下又方冷水調白及末用紙花貼山根又方人中白末吹又方薄荷葉塞又方濕布縛胸上又方刀刮指甲細末吹即止驗又方象牙屑吹入又方黃牛糞陰乾焙黑為細末吹入能除根又方山梔炒黑為末吹鼻中效又方血餘燒灰吹胎髮少壯人發更好又方龍骨末少許吹入又方石榴花干研末吹入鼻血不止用獨頭蒜切片貼於腳心即愈左鼻貼左右鼻貼右又方用線扎中指根左鼻扎左右鼻扎右又方井中泥或苔蘚貼囟門鼻衄不止以本入鼻血紙捻蘸之右衄者點左眼角左衄者點右眼角左右井衄者點兩眼角內立效又方以梔子炭研末吹入鼻中立愈又方鮮旱蓮草搗敷鼻血不止服藥不應蒜一枚去皮細研如泥攤一餅子如錢大厚一豆許左血出貼左足心右血出貼右足心兩鼻齊出貼兩足心血止溫水洗去鼻衄過多昏冒欲死香墨濃研滴入鼻中口門口具甜瓜子杵末蜜丸每晨漱口後含之又方藿香洗淨煎湯頻噙漱又方朝取井華水口含片刻吐廁下數度瘥滿口起泡以致飲食不能進用孩兒茶黃柏枯礬等分共為細末敷之爛嘴青黛一錢硼砂一錢薄荷葉五分人中白一錢兒茶一錢玄明粉五分馬屁勃五分冰片二分研細擦之病甚者加西黃三分珍珠五分效口舌糜爛大紅薔薇葉焙燥研末搽之冬月用根口瘡黃柏五錢青黛二錢同研細末臨臥以二三分置舌下咽津無疑遲明愈凡口瘡不可失睡否則藥不見功又方白螺螄殼燒灰加兒茶少許為末吹患處又方蘿蔔自然汁頻漱去涎又方蚯蚓吳茱萸研末加面調塗足心又方硼砂焰硝含口中再以天南星末用醋調貼足心效又方單用朴硝含之又方雞內金燒灰敷效口瘡色白者黃柏蓽茇等分研糝口瘡色赤者天花粉研末糝口舌生瘡蠶繭五個包硼砂瓦上焙焦為末摻之口舌生瘡爛久不瘥薔薇根煎濃汁稍稍含漱溫含冷吐去夏取莖葉用心脾熱口頰舌上生瘡炙黃柏青黛為末摻之虛火上壅口瘡滿口連舌者草烏頭吳茱萸等分為末蜜調敷足心麻疹毒口瘡黃連一兩炒黑乾薑三錢為末摻小兒口瘡荸薺燒存性研末搽又方黃葵花燒末敷小兒口下黃肌瘡取羖羊須或角燒灰臘豬脂調敷小兒口瘡不能食乳蜜陀僧研末醋調塗二足心愈即洗去小兒初生忽患撮口不飲乳名曰馬牙失治則死兒齒齦上有小泡如粟米狀急以針挑出血用墨磨薄荷汁手指蘸墨遍口齶擦之初生撮口急視口中上下齦間若有白色如豆大許便以指甲掐破青黛末敷之又方白殭蠶二枚為末蜜和敷兒口內以原蠶蛾炙黃代之亦可小兒撮口臍風載臍門小兒雪口馬蘭頭汁擦又方硼砂研細末吹小兒鵝口朴硝兒茶各二分硼砂一分研細蠟搗自然汁調搽小兒鵝白白礬硃砂各二錢半馬牙硝五錢研細先拭淨兒口水調塗舌門舌苔厚用薄荷自然汁和白蜜薑汁擦舌腫甘草濃煎熱漱頻吐又方生蒲黃研細糝或以釜底煤醋和厚敷舌之上下舌忽腫滿或硬於木石但看舌下或如臥蠶者急於腫處重刺出血用釜底煤細研以水調厚敷脫去再敷若遲則閉悶而死須內服清胃降火藥舌腫齦臭映血牙床潰腐真青黛一錢硼砂一錢龍腦薄荷末五分人中白一錢粉口兒茶一錢玄明粉五分馬勃五分梅花冰片二分研細擦之病甚者加西黃三分珍珠五分效尤捷舌腫脹出口蓖麻子取油蘸紙捻燒煙燻又方雄雞冠血浸自縮又方蒲黃乾薑末擦舌腫滿口諸藥不效梅花冰片研細末敷又方生蒲黃末搽上即愈舌卒腫大如豬脬狀滿口不治釜下墨和酒塗舌脹不能飲食用蒲黃燒灰熏之愈舌脹滿口或生瘡用蒲黃頻摻自愈或加乾薑末舌脹卒然腫硬咽喉閉塞即時氣絕至危之症用皂礬不拘多少以新瓦火煅變紅色放地上候冷研末用鉗鉤開牙齒以藥搽其舌即活重舌不蛀牙皂四五挺去核炙焦荊芥穗二錢共為末米醋調塗即消又方蛇蛻燒末調敷小兒重舌衣魚塗舌上或燒灰敷舌上木舌硼砂研末生薑蘸揩木舌腫滿不治殺人蚯蚓一條以鹽化水塗重舌木舌殭蠶為末吹之吐痰若脹大塞口者半夏醋煎含漱之重舌鵝口赤小豆末酢和塗重舌及舌瘡蒲黃微炒糝舌瘡硃砂雄黃黃柏薄荷硼砂冰片末摻之又方羊脛骨中髓和鉛粉塗口舌生瘡爛久不瘥薔薇冬用根夏用莖葉煎濃汁含漱舌上生瘡或白苔乾澀如雪語話不真先以生薑蘸蜜水揩再用薄荷自然汁與白蜜等分調勻敷舌蕈先以醋漱再用茄母燒灰飛鹽等分米醋調稀頻搽舌生紅粟竹瀝調紫雪丹塗之效舌腐象牙廉珠各三分飛青黛六分梅花冰片三釐泥壁上壁錢二十個西牛黃人手指甲男病用女女病用男各五釐共研細吹之雖瀕死可救舌糜爛大紅薔薇葉焙燥研末搽之冬月用根又方黃連末塗舌腐潰爛飲食難進疼痛異常地龍十條吳茱萸五分共研和生面少許醋調塗二足心絹縛之效舌衄炒槐角或槐花研末摻又方以炒黑蒲黃研末敷之舌硬出血木賊煎湯漱止舌腫硬出血海螵蛸蒲黃各等分研細末井華水調敷舌縮口噤生艾搗敷干艾浸濕亦可無故舌忽出口寸余雞冠血塗使人於其後潛擲銅器驚之又方珍珠末稍加冰片敷又方辰砂末敷又方用冷水一桶勿令患者知之將冷水潑令患者一驚即縮入產後舌出不收硃砂敷之令作產兒狀傭婦扶定壁外潛擲瓦器驚則驟收收後再敷五倍子末初生小兒有白膜裹舌或遍舌根以指甲刮破令血出燒礬末半綠豆許否則必成啞矣小兒舌下有膜如榴子連於舌根令兒語言不發可摘斷出血血出不止以發灰摻之又方用白礬灰釜底墨酒調塗舌頭咬斷先以乳香沒藥煎水含口中止痛後急將寒水石黑鉛輕粉硼砂研細粉頻抹以長全為度含刀在口割傷舌頭垂落而未斷雞子白軟皮袋上以花粉三兩赤芍二兩薑黃白芷各一兩研細蜜調塗舌根斷處再以蜜調蠟稀稠得所敷雞子皮上三四日舌接去皮只用蜜蠟自行被跌僕穿斷舌心血出不止鵝翎蘸米酢頻刷斷處其血即止仍用蒲黃杏仁硼砂少許為末蜜調成膏噙化言語門卒風不語生薑安舌下咽津傷寒譫語熬鹽熨胸次小兒數歲不能言此心氣不足舌本無力不能發轉也赤小豆末酒和塗舌上下效聲音門小兒初生不發聲載小兒門小兒初生不啼載情志門咳嗽門久嗽欲死厚榆皮削如指大長尺余納喉中頻出入當吐膿血而愈吐血門失血眩暈生地塞耳鼻須門烏須生柏葉末豬脂和丸彈子大每以布裹一丸納泔水中化開沐之唇門唇吻燥痛欖仁塗唇急作痛甑上滴下水塗效冬月唇裂白荷花瓣貼效開裂出血即止唇腫黑痛癢不可忍大錢四文於石上磨豬脂汁塗唇腫生瘡連年不瘥八月藍葉一斤搗汁洗三四度瘥唇燥生瘡青皮燒灰研豬脂調塗又方桃仁杵爛豬油調塗又方豬胰浸酒搽唇瘡黃柏研末薔薇根搗汁調塗又方旋覆花煅存性研末磨油調搽又方新瓦為末生油調搽又方蒸飯鍋蓋上汽水頻抹唇口疔並連七個頭腫如斗心悶神昏名七星趕月蛔蟲搗爛塗又方五穀蟲一錢焙末白礬三分蟾酥三分燒酒化烊調勻塗疔上疔毒生唇上在大腿彎紫筋上委中穴用銀針刺出血唇衄不止栗子一個連殼燒灰硫黃等分研末和敷羊鬚瘡舊棉絮煅灰麻油調搽唇緊五倍子訶子等分為末敷小兒緊唇頭垢塗又方蠐螬研末豬脂和敷又方雞矢白末敷有涎易去緊唇及重齶重齦蛇蛻燒末先拭後敷牙齒門保齒用旱蓮草根一斤酒洗淨青鹽四兩醃三宿同汁炒乾研末日用擦牙連汁咽之能烏須固齒固齒青鹽入腎入骨擦噙並佳又方火煅羊脛骨為末飛鹽二錢同研日用又方青鹽二兩白鹽四兩以川椒四兩煎汁拌鹽炒乾日用擦牙永無齒疾牙痛火硝一錢冰片一分明雄黃一分元明粉五分為細末擦患處牙疼經宿西瓜皮燒灰敷患處牙縫內立愈又方黑山梔桑葉泡濃湯熱漱不痛乃止又方以兒茶貼患處流出風涎自愈不可嚥下又方石膏火煨熟八兩白蒺藜去刺四兩為極細末頻擦之立愈每日用之可免此患又方蓽茇一錢川椒五分石膏三錢青鹽四分共研細點患處立愈又方青鹽硼砂火硝樟腦各一錢研末擦之又方馬蘭頭葉水溝或水缸內青苔共杵爛以綿卷之左痛塞左耳右亦然牙齒疼痛枳殼浸酒含漱又方黑豆煮酒頻漱良牙齦腫痛山豆根一片含於痛所風熱牙疼絲瓜一條鹽擦過煅研頻擦齦腫痛畏風者風火也荔枝殼燒存性研末頻擦之又方蘿蔔子十四粒生研人乳和左痛點右鼻右痛點左鼻齦腫痛喜吸涼風者濕熱也槐樹枝濃煎入鹽煮乾炒研日揩或用生絲瓜一個擦鹽火燒存性研末頻擦涎盡即愈又方孩兒茶硼砂等分為末頻擦涼水漱吐勿咽齦痛俗呼齒痛不腫者屬虛火西洋參切片貼龍眼肉亦可元氣不足牙齒浮痛骨碎補銅刀細切慢火炒黑為末揩之良久吐去牙疼日久腎虛也補骨脂二兩青鹽五錢炒研擦風齒腫痛馬齒莧一把嚼汁漬之腫消牙痛惡熟黃連末摻之止風蟲牙痛芭蕉自然汁一碗煎熱含漱又方松上脂滾水泡化漱驗又方炒白直殭蠶燒蠶退紙等分為末擦良久鹽湯漱口效牙蟲痛用韭菜子燒煙熏之牙蟲即出其法以筆管用紙糊喇叭樣可以收煙又方黃茄種燒灰擦效齦爛生地一斤鹽二合倒和成團以濕麵包煨令煙盡去面入麝香一分研勻日夜貼又方絲瓜藤一握川椒一撮燈心一把水煎濃汁漱吐牙齦腫爛出臭水芥菜干燒存性研末頻敷愈牙衄絲瓜藤炙灰擦之立止又方絲瓜絡亦可又方草決明煎湯含之即止又方馬蘭頭杵爛塞患處立止又方槐花炒為末搽之齦衄俗名牙宣枯礬敷擦或五倍子燒存性研敷齒縫出血用麥冬煎湯頻漱口以止為度又方用苦參一兩枯礬一錢為末日揩三次又常以鹽湯漱之牙縫出血不止地龍末枯礬各一錢麝香少許研勻擦又麥門冬煎湯漱牙縫出血不止動搖白蒺藜末旦旦擦之即止且牙齦出血百方不效用烏梅煮去核取肉搗成丸噙患處數丸即愈齒齦間津液血出不止生竹茹二兩酢煮含之滿口齒有血枸杞根為末煎湯先漱後吃又治膈上吐血齒黃糯米糠燒取白灰日用擦牙可變為白齒疏爐甘石煅寒水石等分為末每日齒蘸擦久自密忌用牙刷齒搖乾地黃羌活去蘆等分為末每服二錢水一盞酒少許煎十餘沸去滓溫漱冷吐齒損因磕傷打動者蒺藜子為末日揩齒損骨碎補銅刀細切慢火炒黑為末揩之良久吐去小兒齒裂死蚯蚓末敷痛處牙齒逐日漸長開口難為飲食蓋髓液溢所致白朮末和水服及煮水漱齦間胬肉漸長此乃齒壅生地黃汁一鍾皂角數片火上炙熱淬汁內再炙又淬汁盡為度曬研末敷又朴硝為末敷蛀齒蘆薈四分炒研細先用鹽揩淨齒敷少許又方花椒牙皂醋煎漱又方雄黃末和棗肉丸塞鼻中又方冰片硃砂等分擦初生小兒齒齦上起小泡子載口門撮口不飲乳條小兒上下齦間生白色如豆大者撮口症也載口門牙疳黃柏青黛各一錢冰片一分研細擦又方瓦楞子殼研末敷又方雄黃一錢銅綠二錢為末搽又方人腳上皺垢焙黃研末敷二三次效又方五倍子青黛枯礬黃柏等分為末先以鹽揚漱淨糝之走馬牙疳蛔蟲瓦上焙乾研細末加青黛冰片少許研勻吹入又方真青黛一錢硼砂一錢龍腦薄荷末五分人中白一錢粉口兒茶一錢玄明粉五分馬屁勃五分梅花冰片二分研細擦之病甚者加西黃三分珍珠五分效尤捷又方人中白人甕瓶內鹽泥固封煅紅研末人麝香少許貼牙關緊白礬鹽等分擦之涎出自開牙脫烏梅一個含之又方紙捻搐鼻取嚏又方南星研末生薑汁和塗兩頰一夜即上服霜粉牙根腐爛出血不止詳中毒門痰飲門化痰治嗽生明礬二兩人參末一兩酢二升熬膏以油紙包收旋丸如豌豆大每用一丸放舌上釣痰半夏酢煮過皂角末明礬末柿餅搗膏為丸噙之胸中痰澼頭痛不欲食礬石一兩水二升煮半納蜜半合頻服取吐如不吐稍飲熱湯引之卒頭痛如破非中風又非中冷是胸膈中痰氣上衝所致名為厥頭痛單煮茗作飲二三升取吐吐畢又飲又取吐吐數次即瘥雖吐膽汁無害咽喉門喉痘屬時邪風火痰潮壅閉喘急危篤發來迅速先深針委中穴中出血自愈穴在膝蓋對後大小腿交界縫喉腫老黃瓜一條上開一小孔去瓤入芒硝令滿懸陰處待硝透出刮下吹點喉腫不能言山豆根磨醋噙之涎出能言腫喉瘡吳茱萸末醋調塗足心咽喉腮頰腫悶以蒜塞耳鼻中喉痛用冰片三分殭蠶五釐硼砂二錢半牙硝七錢半共研細末吹患處咽喉腫痛射干花山豆根陰乾為末吹效喉痹腫痛大蒜塞耳鼻中日二易咽喉疼痛紅腐真青黛一錢硼砂一錢龍腦薄荷末五分人中白一錢粉口兒茶一錢玄明粉五分馬屁勃五分梅花冰片二分研細摻之病甚者加犀黃三分珍珠五分效尤捷喉中腫痛硼砂含化咽津初起便治即免喉痹喉閉咽痛馬勃白礬等分為末以鵝翎管吹吐痰喉閉蛇蛻燒末吹咽喉閉痛箬葉燈心草燒灰等分吹喉痹陳年白梅入蜒蚰令化噙梅於口中冬月喉痹腰痛不可下藥者蛇床子燒煙於瓶中口含瓶嘴吸菸痰自出急喉痹塞逡巡不救生皂莢末少許點患之外以酢調厚封項下須臾便破出血愈喉痹將死不可針藥乾漆燒煙以筒吸之又方雞內金勿洗陰乾煅末竹管吹之鎖喉風閉遇此症先於頭頸處搽香油用錢刮之其痛稍緩好進藥又方人指甲煅研吹喉又方勢危者刺出舌根下紫血又方生桐油以鵝翎蘸之攪喉探吐小兒喉痹不能語以大豆煎汁放冷含喉痹口噤硇砂馬牙硝等分研勻點走馬喉痹白礬末塗綿針上按於喉中立破綿針者用榆條上以綿裹作棗大也又方馬屁勃焰硝為末吹吐涎血愈咽瘡喉痹好來酢噙嗽吐痰喉痹雙乳蛾壁錢窩一個取病人腦後發一根纏定錢窩以銀簪挑就燈上燒灰吹之立消乳喉用手指甲燒灰存性研細末吹入即消單蛾雙蛾即俗呼單喉雙喉也發頂內有泡可用銀針挑破忌見燈火恐泡破處發脹也蛾在左邊用生獨蒜加鹽搗爛敷右手寸關尺脈上以熱痛為度蛾在右邊者用左手亦如之如雙蛾敷左右兩手即愈乳蛾爛者用人中白火煅三分冰片二分共研細末吹入喉中喉蛾頭髮指甲煅存性研吹男用女女用男左用右右用左又方燈心一錢黃柏五分並燒存性白礬七分煅冰片三分共研每以一二分吹喉蛾閉結不開土牛膝草搗汁滴鼻中乳蛾並治喉內一切熱毒硼砂一錢膽礬二錢為細末入青魚膽內陰乾研末加山豆根一錢吹患處流涎喉風舌大如脬即時不救即死冰片一分火硝三分膽礬二分青黛二分殭蠶五分硼砂三分為細末吹之喉風年久夜壺垢炙研細吹入喉風黃瓜去瓤入生礬末裝滿仍將瓜口蓋好外以紙封之掛有風無日處陰乾過驚蟄後七日取下研細吹患處爛喉象牙屑廉珠各三分飛青黛六分梅花冰片三釐壁錢二十個西牛黃人手指甲各五釐共研極細粉吹患處雖瀕死者可救喉爛喉腫喉痛均可以青黛薄荷各八分飛淨雄黃白硼砂真珠各三分兒茶五分冰片一分西牛黃分半各為細末研勻吹之咽生息肉鹽豉和搗塗先刺破出血乃用效喉中生肉綿裹筋頭拄鹽揩之日五六度喉中懸癰舌腫塞痛五倍子殭蠶甘草等分白梅肉搗和丸噙咽癰自破疹後餘毒喉病苦參三錢殭蠶二錢為末吹煙管戳傷咽喉以龍眼核去黑皮焙搗極細用筆管吹患處即定疼止血居家者此藥須預備誤硬門雜物哽咽解衣帶目窺下部不下即出諸物吸入肺管而不能出者無藥可治喘急而死大概小兒或有此患然不必驚慌但捉兩足使倒懸則所入之物一咳即出諸哽煮薤白半熟線系之捉線吞薤下候至哽處牽引哽即出又方哽喉大蒜塞鼻中魚骨哽以魚網覆頭立下又方橘葉常含咽汁頸項門項軟五加皮為末酒調塗項骨上干則易項強太陽受風也荊芥作枕又方蒸黑豆作枕肝腎二臟受風項強木瓜生地酒蒸加乳香沒藥搗塗頭項強不得顧視黑大豆蒸熟作枕閃頸肭腰硼砂研粉以骨簪蘸唾沾粉點兩目淚出即松三點全愈頸項結核生薯蕷一挺蓖麻子二粒各去皮研勻攤貼頸項結痰核生南星研塗痰核紅腫寒熱狀如瘰癧石灰煅為末白果肉同搗貼蜜敷亦可身項粉瘤舊皮鞋底洗淨煮爛成凍子塗之蟻瘻不愈鯪鯉甲二七枚燒灰豬脂調敷蜣螂瘻疾熱牛屎封之日數易當有蜣螂出一切冷瘻人吐蛔蟲燒灰先以甘草湯洗淨塗之瘥天柱瘡生脊大椎上大如錢出水用驢蹄甲二片煅鉛粉熬二錢麝香少許為末醋和塗對口瘡全蠍三個楝樹根煎水洗兼分載癰疽門瘰癧初起未破者好茶泡濃汁與蜂蜜調敷日數易瘰癧未穿靛花馬齒莧同搗日日塗效瘰癧疔瘡發背諸腫紫花地丁根去粗皮同白蒺藜為末油和塗效瘰癧結痰不問新久已潰未潰嫩明松香一兩蔥湯煮化冷水潑淨火麻仁一兩上好松羅茶葉五錢共搗如泥油紙攤為膏貼神效瘰癧以羚羊角燒灰研細雞卵清和塗又方以豬膽汁以胭脂邊一方滲透懸風處吹乾剪貼患處又方豆腐泔水一捅慢熬成膏頻頻塗之又方南星半夏等分為末米醋或雞子清調敷黃柏為末豬油調敷又方活鯽魚一尾生山藥如魚長一段白糖三錢杵爛塗之又方土貝母研末陳米醋調敷又方牛皮膠一兩水熬化入土貝母末五錢攤油紙貼之又方佛前舊羊角燈底焙存性研末麻油調敷又方田中螞蝗搗爛圍之即散又方麵糊作餅貼於先潰之處再用小砂壺兩把俱盛燒酒煎滾去酒以熱壺口覆於餅上熏之一壺冷又易一壺如此數次將毒拔盡則愈熏後用豬膽汁熬成膏貼之瘰癧已潰陳年破明角燈燒存性研菜油和塗又方牆上白螺螄殼研末敷又方牛皮油靴底燒灰調敷瘰癧不斂松香末一兩白礬三錢為末麻油調塗瘰癧已破汁出不止鴨脂調半夏末日日敷瘰癧日久成硬核者陳米醋調蜜敷癧破多年膿水不絕百年茅屋廚中壁土為末入輕粉調敷半月瘰癧破爛多年不愈延及胸脅臭穢難聞雖十數載之頑證可用新石灰一塊滴水化開成粉以生桐油調勻乾溼得中先用蔥椒湯洗淨瘡口塗數日即愈瘰癧收口龜板煅過埋地中四十九日青果陰於煅同研細末收口效肩門肩疽吳茱萸用鹽醃過炒研酢和塗肩臂累累如赤豆者為瘭疸剝去瘡痂以酒和麵敷頸肩胸背大腫赤發朴硝五兩香豉生地黃汁各半升同搗煮令地黃爛熟敷腫厚二分日三四易使不成膿並治一切腫背門發背初起雞內金不落水者陰乾用時溫水潤開貼之隨干隨潤以愈為度又方牡蠣粉灰以雞子白和塗瘡四圍頻上又雞肫皮浸軟貼發背腫毒未成者活蟾一個系放瘡上半日蟾必昏憒置水中再易一個如前法重者破開連肚乘熱合瘡上發背初起紅色者用稠泥圍瘡外成圈中間放水下螞蝗數條待蝗吸毒血一日三易癰疽發背初起未成者苧根熟搗敷上日夜數易瘥發背芙蓉花及葉並曬乾為末酢調敷白蓮尤佳又方紫荊皮為末酒調箍住即撮小不開癰疽發背及乳瘡半夏末雞子白調塗虛火背瘡背內熱如火炙附子末津調塗湧泉穴發背癰癤糞坑底泥陰乾為末新水調敷癰腫發背酢磨濃墨塗四圍中以豬膽汁塗干又上發背諸腫毒豬脂切片冷水浸貼熱即易散盡為度發背欲死伏龍肝末酒調厚敷干即易又冬瓜截頭合瘡上瓜爛截去再合發背欲死及一切腫毒赤遊風疹風熱頭痛芭蕉根搗爛塗癰疽發背大如盤臭腐不可近桐葉酢蒸貼效發背已潰雞肫黃皮同綿絮焙末搽背瘡潰爛黃黑牛屎多年者曬乾為末入百草霜研勻細摻背疽已潰如碗視五臟僅膈膜大鯽魚一枚去腸贓以羯羊糞入其中烘焙焦黑極燥為細末乾摻須候膿少時用背瘡肉長疾皮不及裹見風成僵寒水石燒研為細末敷再用銅綠細末上之肘腋門腋氣即狐臭生薑汁頻塗又方龍眼核六枚胡椒十四粒研勻頻擦患腋臭者耳內皆有油濕大田螺一個養水中候靨開以巴豆肉一粒針挑放螺內仰頓盞內化水搽腋下又方密陀僧四兩白礬枯過二兩輕粉三錢共為細末擦一月又方裹鐵落熨腋下療狐臭驗又自己小便乘熱久洗又方大田螺一個入麝香三分在內埋露地七七日取出將患處洗拭以墨塗上再洗看有墨處是患竅以螺汁點之又方雞子兩枚煮熟去殼熱夾待冷棄路旁勿顧又方漿水洗淨油調密陀僧塗或用熱蒸餅一個切開密陀僧摻末夾之又方礬石絹袋盛之常粉腋下羊昷羝腋氣也俗曰肋腥臭用大田螺一個巴豆仁一粒膽礬豆大一粒麝香少許先將螺養吐去泥土靨藥於內用線拴住放瓷碗內次日化成水凡用須五更時將藥水以手自抹其腋下不住手抹藥直待腹中欲瀉卻住手揀深遠無人到處空地內出大便黑糞極臭是其驗也以土蓋之勿令人知如不盡再抹之又去大便次用枯礬一兩蛤粉五錢樟腦一錢研細擦之以去病根又方精豬肉兩大片以甘遂末一兩拌之五更時挾腋下至天明以生甘草一兩煎湯飲之良久瀉出穢物須棄野地中恐氣傳人也五次即愈虛弱者間日為之腋癰池塘爛泥一杯桐油三杯和勻以鵝翎頻掃塗勿令乾又方糯米飯乘熱入鹽塊蔥管少許極爛如膏貼患處即消腋下瘤癭長柄苦壺燒研末搽以消為度脅門脅痛用白芥子研末水調敷之又方吳茱萸研末醋調敷之又方韭菜炒熨之又方青皮研末炒酒淬揉之肋臂腿腰間等處忽如火熱腫硬如石痛不可忍傴僂跼蹐急用糯米炊飯少加食鹽蔥管共搗罨一二次過宿即松其滓務傾魚池或河內腹脅積塊風水石灰末半斤瓦器焙極熱稍冷入大黃末一兩炒熱入桂心末半兩略炒下米酢攪成膏攤布貼脅瘡如牛眼狀者以鹽少許入牛耳取其垢敷脅疽見臟赤豆苧根為末水調塗病後脅脹滿熬鹽熨胸門結胸脹痛大蒜搗爛攤貼寒結胸巴豆飛面研調餅敷熱結胸大黃芒硝蔥白搗敷胸膺一片如碗大無皮潰腐浸淫成漏流膿血水久不愈荸薺一味看瘡大小日日糝之大人小兒胸間二旁生紅白瘰泡浸淫疼癢每處日長一條連生十餘個名曰簾珠倒掛久則殺人端午日人家檐口所掛刀茅連根葉切碎煅末香油調搽五六次痞滿門痞用大黃朴硝各一兩為末以大蒜同搗膏貼之心坎門急症心痛黃瓜一條剖對開去肉子入明礬末合住線縛懸掛陰乾皮上起白霜取下遇此症將瓜霜點眼四角愈情志門初生不啼蔥白莖鞭之小兒夜啼用硃筆於兒臍下書一田字效又方五倍子研末唾調填臍中又方硃砂寫子午二字貼臍上怔忡驚悸門驚恐魂飛鐵器燒紅更迭淬醋中就病人之鼻熏之小兒闢驚鵝腹毳毛為衣被絮柔暖昏迷門熱病神昏鐵器燒紅更迭淬醋中就病人之鼻熏之癲狂門癲狂蘿蔔子為末溫水調服探吐痰涎傷寒狂走炭盆潑醋使聞其氣又方薑汁雞子清調硃砂元明粉塗胸口癇門風痰癇疾金燈花根似蒜者一個以清茶研如泥日中時以茶調下即臥日中良久吐出雞子大物如不吐以熱茶引之驚風門小兒月內驚風丹砂末新汲水調塗五心急驚風白頭蚯蚓刀斬兩取跳急者加麝香半分搗爛貼臍痰火閉俗名急驚風搐搦身仰不可用力緊抱以傷其筋絡但以手扶聽其自抽用通關散吹鼻取嚏次以竹瀝或梨汁或石菖蒲汁皆可灌小兒驚風車死烏骨白雞血少許抹唇上小兒急慢驚風牙關緊急不可開者皂角末水調塗牙齦上入咽即蘇小兒截驚芭蕉汁薄荷汁煎勻塗頭頂留囟門塗四肢留手足心勿塗效乳門婦人乳腫馬尿塗愈乳吹甘菊花根葉杵爛汁酒沖服渣敷患處立效又方貝母末吹鼻效吹乳成癰豬板油一斤冷水浸貼熱即易乳塞不通而皮癰名妒乳黃柏研細雞子清和厚敷乳發初起不治殺人鹿角磨濃汁塗並令人吮去黃水乳癰紅腫方發活小鯽魚一尾去腸生山藥或芋艿寸余同搗爛塗發癢即愈乳癰苧根搗根敷又方炒蔥白搗敷炭火盛瓦器逼之又方蔥白杵敷並絞汁服乳癰腫毒白梅煅研入輕粉少許麻油和圍初起已潰皆可用乳癰堅紫色青久不愈柳根刮去皮搗爛燉溫盛煉囊中熨孔上冷則易乳癰串爛年久不愈洞見內腑深陷不愈搖船櫓上首手捏處舊藤箍剪下陰陽瓦焙末日日糝之如干者以香油調搽乳癖活鯽魚一尾鮮山藥如魚長者一段共搗爛敷患處以紙蓋之立愈又方豬油切片冷水浸貼熱即易散盡為度婦人乳瘡生芝麻嚼爛敷男女乳上濕瘡膿血淋漓成片飛紅無靨痛癢不休此名大革瘡蚌殼煅末五錢配輕粉五分冰片一分研勻銀花湯調搽乳裂胭脂蛤粉等分研敷乳頭碎裂老黃茄子燒灰敷又方白茄子燒灰敷之又方丁香末敷乳頭破爛龜板炙研末加冰片研勻麻油調搽又方室珠茶花焙研末麻油調敷內服治諸血證藥女人乳岩蒲公英搗爛盦患處妙婦人回乳用男子裹腳布勒止經宿即止乳汁不行內服通乳藥外用木梳梳乳周周百餘遍腹門一切腹脹大蒜搗爛攤貼腹中脹滿綿裹煨姜納下部冷即易之小兒腹脹肚皮青色煎用胡粉鹽熬色變摩腹上天行病小腹滿不得小便雌黃末蜜丸納尿孔中入半寸被匪徒輪姦精滿腹脹欲死舊草鞋一隻燒煙熏陰戶再用一隻煎湯即以鞋向下揉腹精自沿出腹痛紅棗二枚巴豆三粒同杵爛裹縛臍上立止傷寒腹痛蔥白炒覆臍上砂壺盛熱湯熨之傷寒陰症腹痛剝熱雞皮貼夾色傷寒陰症肚痛面青載傷寒門傷寒小腹絞痛面白肢冷並無頭痛發熱者吳茱萸二兩五錢酒拌蒸絹包熨臍下足心霍亂腹痛炒鹽一包熨其心腹令氣透又以一包熨其背攪腸痧陰陽腹痛手足冷但身上有紅點以燈草蘸油點火焠點上小兒盤腸內釣腹痛腰曲乾啼蔥湯洗腹並以炒蔥搗貼臍中臍門氣臍大如慄虛腫而軟痛竹瀝頻塗小兒臍腫荊芥煎湯洗煨蔥貼之須常留意勿為尿濕小兒臍突囊腫大黃牡蠣各五錢朴硝二錢研末每一二錢以田螺一枚洗淨浸一宿取水調塗小兒多哭以至臍突須設法使之不哭外用赤小豆淡豆豉天南星白蘞各一錢為末搗芭蕉自然汁調塗四圍小便下愈肚臍突出原斷臍帶並艾葉同燒灰油胭脂調搽小兒臍濕發灰棉灰皆可敷須防受風又方枯礬龍骨為末麝香少許拭臍干敷之避風小兒臍汁不幹車前子炒焦為細末敷臍間出水附子二錢甘遂錢半蛇床子一錢麝香五釐各研細末和勻填臍中外加膏藥封之腹如鐵石臍出水變作蟲行狀煎蒼朮湯浴小兒臍未落時腫痛水出故緋絹燒灰研細末敷小兒臍爛哆羅呢羽毛緞嗶吱絨洗絨子皆可燒灰研末厚糝包好勿見風如濕再糝小兒臍瘡黃柏或龍骨末敷又方干蝦蟆灰頻敷又方胭脂海螵蛸研末油調搽小兒臍帶有犯而落舊根未斂潰腫成瘡白龍骨黃柏枯礬為末敷臍風爛瘡紅綿黃牛糞同燒灰干胭脂各五分濕則濕敷干則清油調敷臍瘡久不瘥馬齒菜燒研敷小兒臍瘡變癇黃連二錢半鉛粉龍骨煅各一錢研細和勻頻以少許敷臍中小兒臍爛成風杏仁去皮研敷小兒撮口臍風胎熱也蝸牛五枚去殼研汁塗口小兒臍風撮口生地生薑蔥白蘿蔔子田螺肉共搗爛塗臍四圍一指厚抱住泄矢氣而愈又方噤口者用蜈蚣一條酒炙蠍梢四條殭蠶七條瞿麥五分為末以少許吹鼻取嚏啼哭者可治臍風將死搗蒜安臍以熱艾灸蒜上至口中有蒜氣方止仍以蒜汁滴鼻中又方艾燒灰厚敷臍上綢絹裹之腫脹門腫毒初起麻油煎蔥黑色趁熱通手塗井內服一二斤諸腫毒山藥搗爛塗遍身黃腫掘新鮮百部根洗搗罨臍上以糯米飯半升拌水酒半合揉軟蓋在藥上以帛包住一二日後口作酒氣自愈積聚腫滿白馬屎同蒜搗膏敷患處效風濕腫痛生芥子末調熱酒或熱醋包患處手足心腫乃風也椒鹽末等分酢和敷之陰囊腫痛用連根蔥白頭二十一根不必水洗川椒一兩麥芽炒一兩地膚子一兩共煎湯淋洗日三度水腫尿少醋炒針砂入豬脂生地龍各三錢甘遂末一錢蔥汁和敷臍中約一寸厚尿多為度又方商陸入麝香三分貼臍小便利則腫自消水氣腫滿大蒜田螺車前子等分熬膏攤貼臍中效水腫自足起削楠木桐木煮汁漬足並飲少許水腫從足起入腹則殺人赤小豆一斗煮極爛取汁五升溫漬足膝若已入腹但食小豆勿雜食水臌腫胖輕粉二錢巴豆四錢去油生硫黃一錢研末做成餅以新棉一片鋪臍上次以藥餅當臍按之外以帛縛之自然瀉下候五六次去餅以溫粥補之效愈後忌涼水水腫氣腫大麥拌硃砂喂雄雞取其矢澄清熬膏貼臌腫蓋草稻草煎湯洗一切臌脹肚飽發虛大田螺一個雄黃一錢甘遂末一錢麝香一分藥末螺搗如泥以麝香置臍上以物覆之束好小便大通去之積聚門積聚為結塊於腹內陳醬茄燒存性入麝香輕粉少許豬油調貼痞塊水紅花新鮮者同老蒜打爛量入皮硝一二兩捏成餅比痞塊大圍放痞上用袱紮緊待乾再換大人小兒癬塊甘草甘遂各三錢硇砂一錢木鱉子四個去殼莧菜三錢鱉肉一兩蔥頭七個加蜜少許搗成膏以狗皮攤貼藥乾用蔥蜜潤之大人小兒痞積水紅花細末以面和加麝一釐放痞上熨斗烙數次愈腹中痞塊皮硝一兩獨蒜一個大黃末八分搗餅貼患處漸消又方耆葉穿山甲末獨蒜食鹽同以好酢搗餅量痞大小貼能化痞為膿從大便出腹中痞積水紅花或子用桑柴文武火煎成膏量痞大小攤貼仍以酒調膏一匙服忌腥葷油膩腹脅痞塊雄黃白礬各一兩為末麵糊調膏攤貼效小兒乳癖白芥子研成膏攤紙花子上貼痛硬處癥瘕門一切癥瘕大麥拌硃砂喂雄雞取其矢澄清熬膏貼病發症者欲得飲油用油一升入香澤煎之盛置病人頭邊令氣入口鼻勿與飲疲極眠睡發當從口出急以石灰粉手捉取抽盡痰凝氣滯在皮裡膜外臭椿根皮內肉打碎煎膏貼患處塊即下行而消痞癖等與積聚相類可參觀蟲門寒症吐蛔花椒烏梅肉搗餅擦胸口蟯蛔在胃中漸漸羸人楝實醇苦酒中浸再宿用棉裹納穀道中頻易蟲蝕下部肚盡腸穿長服蝦蟆青背者一枚雞骨一分燒為灰和合吹下部令深入效霍亂門霍亂腹痛炮鹽一包熨心腹令氣透又以一包熨背攪腸痧痛手足冷身有紅點以燈草蘸油點火焠於點上霍亂危急時用鹽斤許炒熱包二包更替熨肚時即愈乾霍亂鹽湯一碗入皂角末少許調服探吐效霍亂未得吐下用蒜搗敷足心霍亂轉筋而肢冷燒酒摩搨患處效霍亂轉筋俗名吊腳痧入腹即死急用糟燒一大碗湯入斑蝥末攪乘熱熨四肢數人用手連拍之冷則易至小便通然後服藥不然無及干濕霍亂轉筋大蒜搗塗足心愈又方皂角末吹豆許入鼻取嚏霍亂轉筋入腹無可奈何以酢煮青布搽之冷即易又方小蒜鹽各一兩搗敷臍中灸七壯霍亂轉筋欲死氣絕腹有暖氣者鹽填臍中灸七壯霍亂轉筋身冷心下微溫者硃砂研二兩蠟三兩和丸著火籠中熏之周圍厚覆勿令煙泄兼床下著火令腹暖當汗出而蘇痧氣門番痧狀如蚊咬粒如㾦瘰看頭額及胸前兩邊或腹上與肩膊處照定紅點以紙捻條或粗燈草微蘸香油點著焠之痧在膚里發不出者用青錢或瓷碗口蘸香油自上向下刮若背脊頸骨及胸前脅肋兩肘臂膝腕以紅紫色靛方止又方於兩臂彎兩腿彎蘸溫水拍打露出紫紅然後以針刺出毒血攪腸痧載霍亂門腰門腰挫氣硼砂研極細點眼睛四角閃腰木香一錢麝香三分共研細末右痛吹入左鼻左痛吹入右鼻令病人手上下動之卒然腰痛大豆六升水拌濕炒熱布裹熨之冷則易蛇纏瘡糯米嚼爛和鹽敷又方雄黃研末醋調塗仍用酒調服又方舊糞桶箍煅研麻油調敷腰疽用糯米飯乘熱入鹽塊蔥管少許杵爛如膏貼患處即消腰脊脹痛芥子末酒調貼效腰腳錐痛牽引支腿貓屎燒灰唾津調塗腰腳冷痛草烏頭三個去皮臍為末醋調貼男婦大小腋肋臂腿腰間等處忽如火熱腫硬如石痛不可忍傴僂跼蹐急用糯米炊飯少加食鹽蔥管搗罨一二次過宿即松其渣務傾大水內
